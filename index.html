<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de EPI - VIC</title>
    <style>
        :root { 
            --primary: #004a99; 
            --cyan-bg: #00bcd4; 
            --cyan-light: #e0f7fa; 
            --white: #ffffff;
            --success: #28a745;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--cyan-bg), #008ba3); 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        
        .container { 
            background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; max-width: 450px; 
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 120px; height: auto; }
        
        h2 { color: var(--primary); text-align: center; margin-top: 0; font-size: 22px; }
        
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.4s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003570; transform: scale(1.02); }
        button:disabled { background: #999; cursor: not-allowed; }
        
        .btn-adicionar { background: var(--cyan-bg); }
        .btn-finalizar { background: var(--success); }
        .btn-voltar { background: none; color: #666; border: 1px solid #ddd; margin-top: 10px; }

        .item-carrinho { background: var(--cyan-light); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--primary); color: #333; font-size: 14px;}
        .loading-text { text-align: center; font-size: 12px; color: #888; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" alt="Logo VLI" class="logo">
    </div>

    <h2>Portal de EPI - VIC</h2>

    <!-- PASSO 0: INÍCIO E CONEXÃO -->
    <div id="passo0" class="passo ativo">
        <h3 id="texto-saudacao" style="text-align:center;">Olá!</h3>
        <p style="text-align:center; color:#666;">Sistema de requisição de materiais.</p>
        <button id="btn-iniciar" onclick="irParaPasso(1)">Iniciar Pedido</button>
        <div id="status-sinc" class="loading-text">Conectando ao banco de dados...</div>
    </div>

    <!-- PASSO 1: LOGIN (MATRÍCULA SOMENTE NÚMEROS) -->
    <div id="passo1" class="passo">
        <label for="matricula">Digite sua Matrícula:</label>
        <input type="tel" 
               id="matricula" 
               inputmode="numeric" 
               pattern="[0-9]*" 
               placeholder="Apenas números"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <button onclick="identificarUsuario()">Acessar Sistema</button>
        <button onclick="irParaPasso(0)" class="btn-voltar">Voltar</button>
    </div>

    <!-- PASSO 2: SELEÇÃO DE EPI -->
    <div id="passo2" class="passo">
        <h3 id="nome-exibicao" style="text-align:center; color:var(--primary); margin-bottom: 20px;"></h3>
        
        <label for="epi">Selecione o EPI:</label>
        <select id="epi" onchange="atualizarCamposVariaveis()">
            <option value="">Carregando itens...</option>
        </select>

        <div id="container-var1" style="display:none;">
            <label id="label-var1"></label>
            <select id="select-var1"></select>
        </div>

        <div id="container-var2" style="display:none;">
            <label id="label-var2"></label>
            <select id="select-var2"></select>
        </div>

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" value="1" min="1">
        
        <button onclick="adicionarAoCarrinho()" class="btn-adicionar">Adicionar ao Pedido</button>
        <button onclick="location.reload()" class="btn-voltar">Sair / Trocar Usuário</button>
    </div>

    <!-- RESUMO DO CARRINHO -->
    <div id="passo-carrinho" class="passo">
        <h3 style="text-align:center; color:var(--primary);">Resumo do Pedido</h3>
        <div id="lista-carrinho"></div>
        <button onclick="irParaPasso(2)" style="background: var(--cyan-bg);">+ Adicionar Outro Item</button>
        <button id="btn-finalizar-pedido" onclick="enviarTudo()" class="btn-finalizar">Finalizar e Enviar</button>
    </div>

    <!-- SUCESSO -->
    <div id="passo3" class="passo" style="text-align: center;">
        <div style="font-size: 60px;">✅</div>
        <h3 style="color: var(--success);">Pedido Enviado!</h3>
        <p>Anote seu protocolo:</p>
        <h1 id="num-protocolo" style="color: var(--primary); font-size: 40px; margin: 10px 0;">0000</h1>
        <button onclick="window.location.reload()">Novo Pedido</button>
    </div>
</div>

<script>
    // Link do seu script fornecido
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVCNIHNRJxEORY_yekUlnFBlZLCDpHFe21EFKNLgWR74NHXVQpRgJHYBrvvdI9OuuZMg/exec'; 
    
    let baseDados = { funcionarios: {}, epis: [] };
    let carrinho = [];

    // Ao carregar a página, tenta sincronizar com a planilha
    window.onload = () => {
        const h = new Date().getHours();
        document.getElementById("texto-saudacao").innerText = (h<12?"Bom dia":h<18?"Boa tarde":"Boa noite") + "!";
        sincronizar();
    };

    async function sincronizar() {
        const statusEl = document.getElementById("status-sinc");
        try {
            const resp = await fetch(SCRIPT_URL);
            baseDados = await resp.json();
            
            if (baseDados.erro) {
                statusEl.innerText = "❌ " + baseDados.erro;
                statusEl.style.color = "red";
            } else {
                statusEl.innerText = "✅ Banco de dados conectado";
                statusEl.style.color = "green";
                popularEPIs();
            }
        } catch (e) {
            statusEl.innerText = "❌ Erro de conexão com a planilha";
            statusEl.style.color = "red";
        }
    }

    function irParaPasso(n) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        const id = (n === 'carrinho') ? 'passo-carrinho' : 'passo' + n;
        document.getElementById(id).classList.add('ativo');
    }

    function identificarUsuario() {
        const matInput = document.getElementById("matricula").value.trim();
        
        if (baseDados.funcionarios && baseDados.funcionarios[matInput]) {
            document.getElementById("nome-exibicao").innerText = "Olá, " + baseDados.funcionarios[matInput];
            irParaPasso(2);
        } else {
            alert("Matrícula " + matInput + " não encontrada na aba Funcionarios.");
        }
    }

    function popularEPIs() {
        const sel = document.getElementById("epi");
        sel.innerHTML = '<option value="">Selecione o item...</option>';
        baseDados.epis.forEach(e => {
            sel.innerHTML += `<option value="${e.nome}">${e.nome}</option>`;
        });
    }

    function atualizarCamposVariaveis() {
        const epiSelecionado = document.getElementById("epi").value;
        const epi = baseDados.epis.find(x => x.nome === epiSelecionado);
        
        const c1 = document.getElementById("container-var1"), c2 = document.getElementById("container-var2");
        const s1 = document.getElementById("select-var1"), s2 = document.getElementById("select-var2");
        
        if (epi) {
            // Lógica para Variação 1 (ex: Tamanho)
            if (epi.label && epi.opcoes.length > 0 && epi.opcoes[0] !== "") {
                c1.style.display = "block";
                document.getElementById("label-var1").innerText = epi.label + ":";
                s1.innerHTML = epi.opcoes.map(o => `<option value="${o}">${o}</option>`).join("");
            } else { c1.style.display = "none"; s1.innerHTML = ""; }

            // Lógica para Variação 2 (ex: Sexo)
            if (epi.label2 && epi.opcoes2.length > 0 && epi.opcoes2[0] !== "") {
                c2.style.display = "block";
                document.getElementById("label-var2").innerText = epi.label2 + ":";
                s2.innerHTML = epi.opcoes2.map(o => `<option value="${o}">${o}</option>`).join("");
            } else { c2.style.display = "none"; s2.innerHTML = ""; }
        }
    }

    function adicionarAoCarrinho() {
        const epi = document.getElementById("epi").value;
        if (!epi) return alert("Selecione um EPI primeiro.");
        
        const v1 = document.getElementById("select-var1").value || "";
        const v2 = document.getElementById("select-var2").value || "";
        
        let detalhes = v1 + (v1 && v2 ? " / " : "") + v2;
        
        carrinho.push({ 
            epi: epi, 
            detalhes: detalhes || "N/A", 
            qtd: document.getElementById("quantidade").value 
        });
        
        renderizarCarrinho();
        irParaPasso('carrinho');
    }

    function renderizarCarrinho() {
        const lista = document.getElementById("lista-carrinho");
        lista.innerHTML = carrinho.map((item, index) => `
            <div class="item-carrinho">
                <strong>${item.qtd}x</strong> ${item.epi}<br>
                <small>Especificação: ${item.detalhes}</small>
            </div>
        `).join("");
    }

    async function enviarTudo() {
        const btn = document.getElementById("btn-finalizar-pedido");
        btn.innerText = "Enviando aguarde..."; btn.disabled = true;
        
        const prot = Math.floor(1000 + Math.random() * 9000);
        const nomeFunc = document.getElementById("nome-exibicao").innerText.replace("Olá, ", "");

        try {
            for (let item of carrinho) {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar erros de CORS no Google
                    body: JSON.stringify({ 
                        protocolo: prot, 
                        funcionario: nomeFunc, 
                        epi: item.epi, 
                        detalhes: item.detalhes, 
                        quantidade: item.qtd 
                    })
                });
            }
            document.getElementById("num-protocolo").innerText = prot;
            irParaPasso(3);
        } catch (e) {
            alert("Erro ao salvar dados. Verifique a aba Pedidos."); 
            btn.disabled = false; 
            btn.innerText = "Finalizar e Enviar";
        }
    }
</script>
</body>
</html>
