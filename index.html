<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EPI - VIC</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; border-bottom: 2px solid var(--cyan); padding-bottom: 10px; }
        .passo { display: none; }
        .passo.ativo { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--cyan); margin-top: 20px; }
        .btn-enviar { background: #28a745; margin-top: 15px; }
        .item-card { background: #eef9ff; border-left: 4px solid var(--primary); padding: 10px; margin-top: 8px; border-radius: 4px; font-size: 14px; }
        .lista-container { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Portal EPI - VIC</h2>

    <div id="p0" class="passo ativo">
        <p style="text-align:center;">Carregando informações...</p>
        <div id="status" style="text-align:center; font-weight:bold; color: var(--primary);">Buscando conexão...</div>
    </div>

    <div id="p1" class="passo">
        <label>Digite sua Matrícula:</label>
        <input type="tel" id="mat-input">
        <button onclick="logar()">Acessar</button>
    </div>

    <div id="p2" class="passo">
        <p id="user-info" style="text-align:center; font-weight:bold; color: var(--primary);"></p>
        
        <label>EPI:</label>
        <select id="epi-sel" onchange="renderExtras()"></select>
        <div id="extras"></div>

        <button class="btn-add" onclick="addItem()">+ Adicionar Item</button>

        <div id="carrinho" class="lista-container" style="display:none;">
            <p style="font-size:12px; font-weight:bold; color:#888;">ITENS NO PEDIDO:</p>
            <div id="lista-corpo"></div>
            <button class="btn-enviar" id="btn-final" onclick="enviarTudo()">Finalizar Pedido</button>
        </div>
    </div>

    <div id="p3" class="passo" style="text-align:center;">
        <div style="font-size: 50px;">✅</div>
        <h3>Pedido Concluído!</h3>
        <p>Protocolo gerado com sucesso na planilha.</p>
        <button onclick="location.reload()" style="background:#555;">Novo Pedido</button>
    </div>
</div>

<script>
    // --- COLE SEU LINK NOVO AQUI ---
    const SCRIPT_URL = 'COLE_AQUI_SEU_LINK_DE_IMPLANTAÇÃO';
    
    let dados = { funcionarios: {}, epis: [] };
    let itens = [];

    window.onload = async () => {
        const status = document.getElementById("status");
        try {
            const res = await fetch(SCRIPT_URL);
            dados = await res.json();
            if(dados.erro) throw new Error(dados.erro);
            
            status.innerText = "✅ Pronto!";
            setTimeout(() => {
                const sel = document.getElementById("epi-sel");
                sel.innerHTML = '<option value="">Selecione...</option>';
                dados.epis.forEach(e => sel.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
                ir(1);
            }, 500);
        } catch (e) {
            status.innerText = "❌ Erro de conexão. Verifique se o link está correto e se a permissão é 'Qualquer Pessoa'.";
        }
    };

    function ir(n) {
        document.querySelectorAll('.passo').forEach(d => d.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    function logar() {
        const m = document.getElementById("mat-input").value.trim();
        if (dados.funcionarios[m]) {
            document.getElementById("user-info").innerText = "Colaborador: " + dados.funcionarios[m];
            ir(2);
        } else { alert("Matrícula não encontrada!"); }
    }

    function renderExtras() {
        const epi = dados.epis.find(x => x.nome === document.getElementById("epi-sel").value);
        const box = document.getElementById("extras");
        box.innerHTML = "";
        if (epi) {
            if (epi.label) box.innerHTML += `<label>${epi.label}</label><select id="ex1">${epi.opcoes.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
            if (epi.label2) box.innerHTML += `<label>${epi.label2}</label><select id="ex2">${epi.opcoes2.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
        }
    }

    function addItem() {
        const nome = document.getElementById("epi-sel").value;
        if (!nome) return alert("Selecione um EPI!");
        const e1 = document.getElementById("ex1") ? document.getElementById("ex1").value : "";
        const e2 = document.getElementById("ex2") ? document.getElementById("ex2").value : "";
        
        itens.push({ epi: nome, detalhes: (e1 + " " + e2).trim() });
        document.getElementById("carrinho").style.display = "block";
        document.getElementById("lista-corpo").innerHTML = itens.map(i => `<div class="item-card"><b>${i.epi}</b><br>${i.detalhes}</div>`).join('');
        
        document.getElementById("epi-sel").value = "";
        document.getElementById("extras").innerHTML = "";
    }

    async function enviarTudo() {
        const btn = document.getElementById("btn-final");
        btn.innerText = "Enviando..."; btn.disabled = true;
        const nome = document.getElementById("user-info").innerText.replace("Colaborador: ", "");

        try {
            for (const i of itens) {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ funcionario: nome, epi: i.epi, detalhes: i.detalhes })
                });
            }
            ir(3);
        } catch (e) {
            alert("Erro ao salvar.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
