<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png">
    <title>Portal VIC</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --success: #28a745; --danger: #dc3545; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: #ffffff; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center;
            position: relative; overflow: hidden;
        }
        /* Header Fixo do Usuário */
        #user-header { 
            display: none; background: #f1f3f5; margin: -25px -25px 20px -25px; padding: 10px;
            font-size: 12px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #ddd;
        }
        .logo { width: 140px; height: 50px; margin-bottom: 15px; object-fit: contain; }
        h2 { color: var(--primary); font-size: 18px; text-transform: uppercase; margin-bottom: 10px; }
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin: 12px 0 4px; font-weight: bold; text-align: left; font-size: 13px; color: #444; }
        input, select, button, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        textarea { resize: none; height: 80px; }
        
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        .btn-menu { background: #f8f9fa; color: var(--primary); border: 2px solid var(--primary); margin-bottom: 10px; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .btn-enviar { background: var(--success); margin-top: 15px; }
        .card { background: #f9f9f9; border-left: 5px solid var(--primary); padding: 10px; margin-top: 8px; text-align: left; font-size: 13px; }
        .footer-credits { position: fixed; bottom: 10px; right: 15px; font-size: 10px; color: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>

<div class="container">
    <div id="user-header">👤 <span id="header-nome"></span></div>
    
    <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo" alt="Logo VLI">
    
    <!-- TELA 0: INÍCIO -->
    <div id="p0" class="passo ativo">
        <h2>Portal VIC</h2>
        <button onclick="iniciar()">Clique para Iniciar</button>
    </div>

    <!-- TELA 1: LOGIN -->
    <div id="p1" class="passo">
        <label>Matrícula do Colaborador:</label>
        <input type="tel" id="mat" placeholder="Sua matrícula">
        <button onclick="logar()">Acessar</button>
    </div>

    <!-- TELA MENU -->
    <div id="pMenu" class="passo">
        <button class="btn-menu" onclick="ir('Ferias')">Marcação Férias <span>📅</span></button>
        <button class="btn-menu" onclick="ir(2)">Solicitar EPI's <span>🛡️</span></button>
        <button class="btn-menu" onclick="ir('Desvio')">Cadastrar Desvio <span>⚠️</span></button>
        <button onclick="location.reload()" style="background:transparent; color:#dc3545; border:1px solid #dc3545; margin-top:20px; font-size:11px;">Sair / Trocar Usuário</button>
    </div>

    <!-- TELA 2: EPI -->
    <div id="p2" class="passo">
        <label>Selecione o Item:</label>
        <select id="epi" onchange="render()"></select>
        <div id="ext"></div>
        <button style="background: var(--cyan); color:#004a99;" onclick="add()">+ Adicionar Item</button>
        <div id="cart-box" style="display:none; margin-top:20px; border-top:1px dashed #ccc; padding-top:10px;">
            <div id="lista"></div>
            <button class="btn-enviar" id="btn-env-epi" onclick="envEpi()">Finalizar e Enviar</button>
        </div>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:10px;">Voltar</button>
    </div>

    <!-- TELA DESVIO -->
    <div id="pDesvio" class="passo">
        <h2 style="color: var(--danger); font-size: 16px;">Relatar Desvio</h2>
        
        <label>Data do Ocorrido:</label>
        <select id="data-opcao" onchange="toggleData()">
            <option value="agora">Agora (Data e Hora atual)</option>
            <option value="retroativo">Selecionar outra data</option>
        </select>
        <div id="custom-date-box" style="display:none; margin-top:10px;">
            <input type="datetime-local" id="data-retro">
        </div>

        <label>Área/Pátio:</label>
        <select id="desvio-patio">
            <option value="Pátio de Cima">Pátio de Cima</option>
            <option value="Pátio de Baixo">Pátio de Baixo</option>
            <option value="Pátio novo">Pátio novo</option>
            <option value="Terminal do Carvão">Terminal do Carvão</option>
            <option value="Oficina">Oficina</option>
            <option value="Estação">Estação</option>
        </select>

        <label>Especifique o Local:</label>
        <input type="text" id="desvio-local-detalhe" placeholder="Ex: AMV 2° linha">
        
        <label>Descrição:</label>
        <textarea id="desvio-desc" placeholder="Detalhes da ocorrência..."></textarea>
        
        <button class="btn-enviar" id="btn-env-desvio" onclick="envDesvio()" style="background: var(--danger);">Relatar Segurança</button>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:10px;">Cancelar</button>
    </div>

    <!-- TELA 3: SUCESSO -->
    <div id="p3" class="passo">
        <div style="font-size: 50px;">✅</div>
        <h3 id="msg-sucesso" style="color: #28a745;">Sucesso!</h3>
        <button onclick="ir('Menu')" style="background:var(--primary);">Voltar ao Menu</button>
    </div>
</div>

<div class="footer-credits">Powered By M.Custodio</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbzLPASIT6clTTipjS804v_MhdAqURqGQ0y-zFJ6sXLMzmFmEFrV68sUpOzQp_z0nQcXhQ/exec';
    let db = { funcionarios: {}, epis: [] }, cart = [], userLogado = "", matLogada = "";

    function ir(n) {
        document.querySelectorAll('.passo').forEach(d => d.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    function toggleData() {
        const box = document.getElementById("custom-date-box");
        box.style.display = document.getElementById("data-opcao").value === "retroativo" ? "block" : "none";
    }

    async function iniciar() {
        const btn = document.querySelector('#p0 button');
        btn.innerText = "Sincronizando..."; btn.disabled = true;
        try {
            const r = await fetch(URL);
            db = await r.json();
            const s = document.getElementById("epi");
            s.innerHTML = '<option value="">Escolha...</option>';
            db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
            ir(1);
        } catch (e) { alert("Erro de conexão."); btn.innerText = "Tentar novamente"; btn.disabled = false; }
    }

    function logar() {
        const m = document.getElementById("mat").value.trim();
        if (db.funcionarios[m]) {
            matLogada = m;
            userLogado = db.funcionarios[m];
            document.getElementById("header-nome").innerText = userLogado + " (" + matLogada + ")";
            document.getElementById("user-header").style.display = "block";
            ir('Menu');
        } else { alert("Matrícula não cadastrada!"); }
    }

    function render() {
        const e = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const x = document.getElementById("ext"); x.innerHTML = "";
        if (e) {
            if (e.label) x.innerHTML += `<label>${e.label}</label><select id="v1">${e.opcoes.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            if (e.label2) x.innerHTML += `<label>${e.label2}</label><select id="v2">${e.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        }
    }

    function add() {
        const n = document.getElementById("epi").value;
        if (!n) return alert("Selecione um item!");
        const v1 = document.getElementById("v1")?.value || "";
        const v2 = document.getElementById("v2")?.value || "";
        cart.push({ n, d: (v1 + " " + v2).trim() });
        document.getElementById("cart-box").style.display = "block";
        document.getElementById("lista").innerHTML = cart.map(i => `<div class="card"><b>${i.n}</b><br><small>${i.d}</small></div>`).join('');
        document.getElementById("epi").value = ""; document.getElementById("ext").innerHTML = "";
    }

    async function envEpi() {
        const b = document.getElementById("btn-env-epi");
        b.innerText = "Enviando..."; b.disabled = true;
        try {
            for (const i of cart) {
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "EPI", funcionario: userLogado, matricula: matLogada, epi: i.n, detalhes: i.d }) });
            }
            cart = []; ir(3);
        } catch (e) { alert("Erro!"); b.innerText = "Tentar novamente"; b.disabled = false; }
    }

    async function envDesvio() {
        const patio = document.getElementById("desvio-patio").value;
        const detalhe = document.getElementById("desvio-local-detalhe").value.trim();
        const desc = document.getElementById("desvio-desc").value.trim();
        const opcaoData = document.getElementById("data-opcao").value;
        
        if (!detalhe || !desc) return alert("Preencha todos os campos!");

        let dataFinal, horaFinal;
        if (opcaoData === "agora") {
            const agora = new Date();
            dataFinal = agora.toLocaleDateString('pt-BR');
            horaFinal = agora.getHours() + ":" + agora.getMinutes().toString().padStart(2, '0');
        } else {
            const retro = new Date(document.getElementById("data-retro").value);
            if (isNaN(retro)) return alert("Selecione uma data válida!");
            dataFinal = retro.toLocaleDateString('pt-BR');
            horaFinal = retro.getHours() + ":" + retro.getMinutes().toString().padStart(2, '0');
        }

        const b = document.getElementById("btn-env-desvio");
        b.innerText = "Enviando..."; b.disabled = true;

        try {
            await fetch(URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ 
                    tipo: "DESVIO", nome: userLogado, matricula: matLogada, 
                    data: dataFinal, horario: horaFinal, 
                    local: patio + " - " + detalhe, descricao: desc 
                }) 
            });
            ir(3);
        } catch (e) { alert("Erro!"); b.innerText = "Tentar novamente"; b.disabled = false; }
    }
</script>
</body>
</html>
