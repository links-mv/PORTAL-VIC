<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de EPI - VIC</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--cyan), #008ba3); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 120px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .passo { display: none; }
        .passo.ativo { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-voltar { background: none; color: #666; border: 1px solid #ddd; }
        .item-c { background: #f0faff; padding: 10px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 14px; }
        .status { text-align: center; font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" alt="Logo VLI" class="logo">
    </div>

    <h2>Portal de EPI - VIC</h2>

    <div id="passo0" class="passo ativo">
        <button onclick="irParaPasso(1)">Iniciar Pedido</button>
        <div id="status-sinc" class="status">Conectando...</div>
    </div>

    <div id="passo1" class="passo">
        <label>Matrícula:</label>
        <input type="tel" id="matricula" placeholder="Somente números">
        <button onclick="login()">Acessar</button>
        <button onclick="irParaPasso(0)" class="btn-voltar">Voltar</button>
    </div>

    <div id="passo2" class="passo">
        <h3 id="user-display" style="text-align:center; color:var(--primary);"></h3>
        <label>Selecione o EPI:</label>
        <select id="epi" onchange="mostrarVars()"><option value="">Carregando...</option></select>
        
        <div id="v1-box" style="display:none;"><label id="l1"></label><select id="s1"></select></div>
        <div id="v2-box" style="display:none;"><label id="l2"></label><select id="s2"></select></div>
        
        <button onclick="add()" style="background:var(--cyan)">Adicionar ao Pedido</button>
        <button onclick="location.reload()" class="btn-voltar">Sair</button>
    </div>

    <div id="passo-resumo" class="passo">
        <h3 style="text-align:center;">Itens Selecionados</h3>
        <div id="lista"></div>
        <button onclick="resetarEirPara2()" style="background:var(--cyan)">+ Adicionar Outro EPI</button>
        <button id="btn-final" onclick="enviar()" style="background:#28a745">Finalizar e Enviar</button>
    </div>

    <div id="passo3" class="passo" style="text-align:center;">
        <div style="font-size:50px;">✅</div>
        <h3>Pedido Concluído!</h3>
        <p>Seu protocolo é: <strong id="prot-txt" style="font-size:24px; color:var(--primary);">0001</strong></p>
        <button onclick="location.reload()">Novo Pedido</button>
    </div>
</div>

<script>
    // Link do seu script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVCNIHNRJxEORY_yekUlnFBlZLCDpHFe21EFKNLgWR74NHXVQpRgJHYBrvvdI9OuuZMg/exec';
    
    let db = { funcionarios: {}, epis: [], proximoProtocolo: "0001" };
    let cart = [];

    window.onload = async () => {
        try {
            const r = await fetch(SCRIPT_URL);
            const data = await r.json();
            if (data.proximoProtocolo) {
                db = data;
                document.getElementById("status-sinc").innerText = "✅ Sistema Pronto";
                popEpi();
            }
        } catch(e) { document.getElementById("status-sinc").innerText = "❌ Erro de Conexão"; }
    };

    function irParaPasso(n) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        document.getElementById(n === 'resumo' ? 'passo-resumo' : 'passo'+n).classList.add('ativo');
    }

    function login() {
        const m = document.getElementById("matricula").value.trim();
        if(db.funcionarios && db.funcionarios[m]) {
            document.getElementById("user-display").innerText = "Olá, " + db.funcionarios[m];
            irParaPasso(2);
        } else { alert("Matrícula não encontrada."); }
    }

    function popEpi() {
        const s = document.getElementById("epi");
        s.innerHTML = '<option value="">Selecione o material...</option>';
        db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
    }

    function mostrarVars() {
        const e = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const b1 = document.getElementById("v1-box"), b2 = document.getElementById("v2-box");
        if(e) {
            if(e.label && e.opcoes[0] !== "") { 
                b1.style.display="block"; 
                document.getElementById("l1").innerText=e.label; 
                document.getElementById("s1").innerHTML=e.opcoes.map(o=>`<option value="${o}">${o}</option>`).join(""); 
            } else b1.style.display="none";
            
            if(e.label2 && e.opcoes2[0] !== "") { 
                b2.style.display="block"; 
                document.getElementById("l2").innerText=e.label2; 
                document.getElementById("s2").innerHTML=e.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join(""); 
            } else b2.style.display="none";
        }
    }

    function resetarEirPara2() {
        document.getElementById("epi").value = "";
        document.getElementById("v1-box").style.display = "none";
        document.getElementById("v2-box").style.display = "none";
        irParaPasso(2);
    }

    function add() {
        const e = document.getElementById("epi").value;
        if(!e) return alert("Selecione o EPI primeiro.");
        const d1 = document.getElementById("s1").value || "";
        const d2 = document.getElementById("s2").value || "";
        cart.push({ epi: e, det: d1 + (d1 && d2 ? " / " : "") + d2 });
        render();
        irParaPasso('resumo');
    }

    function render() {
        document.getElementById("lista").innerHTML = cart.map(i => `<div class="item-c"><b>EPI:</b> ${i.epi}<br><small>Especificação: ${i.det}</small></div>`).join("");
    }

    async function enviar() {
        const btn = document.getElementById("btn-final");
        btn.innerText = "Gravando..."; btn.disabled = true;
        const nome = document.getElementById("user-display").innerText.replace("Olá, ", "");
        const protocoloAtual = db.proximoProtocolo;
        
        try {
            for(let i of cart) {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        protocolo: protocoloAtual, 
                        funcionario: nome, 
                        epi: i.epi, 
                        detalhes: i.det
                    }) 
                });
            }
            document.getElementById("prot-txt").innerText = protocoloAtual;
            irParaPasso(3);
        } catch(e) { 
            alert("Erro ao salvar."); 
            btn.disabled = false; 
            btn.innerText = "Finalizar e Enviar"; 
        }
    }
</script>
</body>
</html>
