<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png">
    <title>Portal VIC</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --success: #28a745; --danger: #dc3545; --dark: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(180deg, #004a99 0%, #002a5a 100%);
            margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--dark);
        }
        .container { 
            background: #fff; width: 100%; max-width: 380px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); overflow: hidden; padding-bottom: 20px;
        }
        #header-user { 
            display: none; background: #f1f3f5; padding: 10px; font-size: 12px; 
            font-weight: bold; border-bottom: 1px solid #ddd; color: var(--primary);
        }
        .logo-area { padding: 20px; text-align: center; }
        .logo { width: 100px; height: auto; }
        
        .passo { display: none; padding: 0 20px; animation: slideUp 0.3s ease-out; }
        .passo.ativo { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 1.2rem; margin: 10px 0; color: var(--primary); text-transform: uppercase; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; text-align: left; }
        input, select, textarea, button { 
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; 
            border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s;
        }
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; }

        .menu-grid { display: grid; gap: 10px; }
        .btn-opt { 
            background: #fff; color: var(--primary); border: 2px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center; padding: 18px;
        }
        .card-epi { background: #f8f9fa; border-left: 4px solid var(--cyan); padding: 8px; margin-bottom: 5px; text-align: left; font-size: 12px; }
        .footer { font-size: 9px; color: #aaa; margin-top: 10px; }
        .creditos { position: fixed; bottom: 5px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="header-user">👤 <span id="u-nome"></span></div>
    
    <div class="logo-area">
        <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo" alt="VLI">
    </div>

    <!-- TELA 0: CARREGAMENTO -->
    <div id="p0" class="passo ativo">
        <h2>Bem-vindo</h2>
        <p id="status-txt">Sincronizando portal...</p>
        <button id="btn-entrar" onclick="init()" style="display:none">Entrar Agora</button>
    </div>

    <!-- TELA 1: LOGIN -->
    <div id="p1" class="passo">
        <label>Matrícula do Colaborador:</label>
        <input type="tel" id="mat" placeholder="00000000" maxlength="15">
        <button onclick="login()">Acessar Painel</button>
    </div>

    <!-- TELA 2: MENU -->
    <div id="p2" class="passo">
        <div class="menu-grid">
            <button class="btn-opt" onclick="ir('3')">Solicitar EPI <span>🛡️</span></button>
            <button class="btn-opt" onclick="ir('4')" style="border-color:var(--danger); color:var(--danger)">Relatar Desvio <span>⚠️</span></button>
        </div>
        <button onclick="location.reload()" style="background:none; color:#999; font-size:11px; margin-top:15px; border:none">Sair do sistema</button>
    </div>

    <!-- TELA 3: EPI -->
    <div id="p3" class="passo">
        <label>Qual EPI deseja?</label>
        <select id="sel-epi" onchange="camposEpi()"></select>
        <div id="extra-epi"></div>
        <button onclick="addEpi()" style="background:var(--cyan)">+ Adicionar Item</button>
        <div id="carrinho" style="margin-top:15px; display:none">
            <div id="itens-carrinho"></div>
            <button onclick="envEpi()" id="b-env-epi" style="background:var(--success)">Enviar Pedido</button>
        </div>
        <button onclick="ir('2')" style="background:#666; font-size:11px">Voltar</button>
    </div>

    <!-- TELA 4: DESVIO -->
    <div id="p4" class="passo">
        <h2 style="color:var(--danger)">Novo Desvio</h2>
        <label>Localização (Pátio):</label>
        <select id="des-patio">
            <option>Pátio de Cima</option>
            <option>Pátio de Baixo</option>
            <option>Pátio Novo</option>
            <option>Terminal do Carvão</option>
            <option>Oficina / Estação</option>
        </select>
        <input type="text" id="des-local" placeholder="Ponto de referência">
        <label>Descrição do Ocorrido:</label>
        <textarea id="des-txt" placeholder="O que você observou?"></textarea>
        <button onclick="envDesvio()" id="b-env-des" style="background:var(--danger)">Registrar Ocorrência</button>
        <button onclick="ir('2')" style="background:#666; font-size:11px">Cancelar</button>
    </div>

    <!-- TELA 5: SUCESSO -->
    <div id="p5" class="passo" style="text-align:center">
        <h1 style="color:var(--success); font-size:50px">✔</h1>
        <p>Dados registrados!</p>
        <button onclick="ir('2')">Novo Registro</button>
    </div>

    <div class="footer">Portal de Gestão Operacional</div>
</div>

<div class="creditos">Powered By M.Custodio</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbxH5o0jtrZwRmVYw2DbQxtwIqbgDL168BQ81nnzh7y6qzQ5OWOwQ_OqMUa-qPgt8JSO0g/exec';
    let db = { funcionarios: {}, epis: [] }, cesta = [], uMat = "", uNome = "";

    // Inicia carregando tudo em segundo plano
    window.onload = () => init();

    function ir(n) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    async function init() {
        try {
            const r = await fetch(URL);
            db = await r.json();
            const s = document.getElementById("sel-epi");
            s.innerHTML = '<option value="">Selecione...</option>';
            db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
            ir('1'); // Vai direto para o login se carregar rápido
        } catch (e) {
            document.getElementById("status-txt").innerText = "Erro de conexão!";
            document.getElementById("btn-entrar").style.display = "block";
        }
    }

    function login() {
        const m = document.getElementById("mat").value.trim();
        if (db.funcionarios[m]) {
            uMat = m; uNome = db.funcionarios[m];
            document.getElementById("u-nome").innerText = uNome;
            document.getElementById("header-user").style.display = "block";
            ir('2');
        } else { alert("Matrícula não encontrada!"); }
    }

    function camposEpi() {
        const e = db.epis.find(x => x.nome === document.getElementById("sel-epi").value);
        const div = document.getElementById("extra-epi"); div.innerHTML = "";
        if (e) {
            if (e.label) div.innerHTML += `<label>${e.label}</label><select id="v1">${e.opcoes.map(o=>`<option>${o}</option>`).join('')}</select>`;
            if (e.label2) div.innerHTML += `<label>${e.label2}</label><select id="v2">${e.opcoes2.map(o=>`<option>${o}</option>`).join('')}</select>`;
        }
    }

    function addEpi() {
        const n = document.getElementById("sel-epi").value;
        if (!n) return;
        const d = ((document.getElementById("v1")?.value || "") + " " + (document.getElementById("v2")?.value || "")).trim();
        cesta.push({ n, d });
        document.getElementById("carrinho").style.display = "block";
        document.getElementById("itens-carrinho").innerHTML = cesta.map(i => `<div class="card-epi"><b>${i.n}</b> - ${i.d}</div>`).join('');
        document.getElementById("sel-epi").value = ""; document.getElementById("extra-epi").innerHTML = "";
    }

    async function envEpi() {
        const b = document.getElementById("b-env-epi");
        b.disabled = true; b.innerText = "Enviando...";
        const prot = "EPI-" + Date.now().toString().slice(-6);
        try {
            for (const i of cesta) {
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "EPI", protocolo: prot, funcionario: uNome, matricula: uMat, epi: i.n, detalhes: i.d }) });
            }
            cesta = []; document.getElementById("itens-carrinho").innerHTML = ""; ir('5');
        } catch (e) { alert("Erro!"); b.disabled = false; b.innerText = "Tentar de novo"; }
    }

    async function envDesvio() {
        const p = document.getElementById("des-patio").value, l = document.getElementById("des-local").value, t = document.getElementById("des-txt").value;
        if (!l || !t) return alert("Preencha tudo!");
        const b = document.getElementById("b-env-des");
        b.disabled = true; b.innerText = "Gravando...";
        const agora = new Date();
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                tipo: "DESVIO", nome: uNome, matricula: uMat, 
                data: agora.toLocaleDateString('pt-BR'), horario: agora.getHours()+":"+agora.getMinutes(),
                local: p + " | " + l, descricao: t 
            })});
            ir('5');
        } catch (e) { alert("Erro!"); b.disabled = false; }
    }
</script>
</body>
</html>
