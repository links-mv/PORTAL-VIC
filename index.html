<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EPI - VLI</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            width: 100%; max-width: 380px; text-align: center;
        }
        .logo { max-width: 160px; margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        .passo { display: none; }
        .passo.ativo { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; text-align: left; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--cyan); color: #004a99; margin-top: 15px; }
        .btn-enviar { background: #28a745; margin-top: 15px; }
        .card { background: #f9f9f9; border-left: 5px solid var(--primary); padding: 10px; margin-top: 8px; text-align: left; font-size: 14px; }
        .carrinho { margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo">
    
    <!-- Tela 0: Início -->
    <div id="p0" class="passo ativo">
        <h2>Solicitar EPI</h2>
        <p style="color:#666; font-size: 14px;">Bem-vindo ao sistema de solicitações.</p>
        <button onclick="iniciar()">Clique para Iniciar</button>
    </div>

    <!-- Tela 1: Login -->
    <div id="p1" class="passo">
        <label>Sua Matrícula:</label>
        <input type="tel" id="mat" placeholder="Digite o número">
        <button onclick="logar()">Entrar</button>
    </div>

    <!-- Tela 2: Seleção -->
    <div id="p2" class="passo">
        <p id="user" style="font-weight:bold; color:var(--primary);"></p>
        <label>Item:</label>
        <select id="epi" onchange="render()"></select>
        <div id="ext"></div>
        <button class="btn-add" onclick="add()">+ Adicionar Item</button>
        <div id="cart-box" class="carrinho" style="display:none;">
            <div id="lista"></div>
            <button class="btn-enviar" id="btn-env" onclick="env()">Enviar Pedido</button>
        </div>
    </div>

    <!-- Tela 3: Fim -->
    <div id="p3" class="passo">
        <div style="font-size: 50px;">✅</div>
        <h3>Pedido Enviado!</h3>
        <p style="color:#666;">Seus itens foram registrados com sucesso na planilha.</p>
        <button onclick="location.reload()" style="background:#666;">Novo Pedido</button>
    </div>
</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbzLPASIT6clTTipjS804v_MhdAqURqGQ0y-zFJ6sXLMzmFmEFrV68sUpOzQp_z0nQcXhQ/exec';
    let db = { funcionarios: {}, epis: [] }, cart = [], prot = "";

    // Inicia o carregamento silencioso assim que a página abre
    const load = fetch(URL).then(r => r.json()).then(d => db = d);

    function ir(n) {
        document.querySelectorAll('.passo').forEach(d => d.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    async function iniciar() {
        const btn = document.querySelector('#p0 button');
        btn.innerText = "Carregando...";
        await load; // Espera o fetch terminar se ainda não terminou
        const s = document.getElementById("epi");
        s.innerHTML = '<option value="">Selecione...</option>';
        db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
        ir(1);
    }

    function logar() {
        const m = document.getElementById("mat").value.trim();
        if (db.funcionarios[m]) {
            const d = new Date();
            prot = `VLI-${d.getDate()}${d.getMonth()+1}-${d.getHours()}${d.getMinutes()}${d.getSeconds()}`;
            document.getElementById("user").innerText = db.funcionarios[m];
            ir(2);
        } else alert("Matrícula não encontrada.");
    }

    function render() {
        const e = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const x = document.getElementById("ext"); x.innerHTML = "";
        if (e) {
            if (e.label) x.innerHTML += `<label>${e.label}</label><select id="v1">${e.opcoes.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            if (e.label2) x.innerHTML += `<label>${e.label2}</label><select id="v2">${e.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        }
    }

    function add() {
        const n = document.getElementById("epi").value;
        if (!n) return;
        const v1 = document.getElementById("v1")?.value || "", v2 = document.getElementById("v2")?.value || "";
        cart.push({ n, d: (v1 + " " + v2).trim() });
        document.getElementById("cart-box").style.display = "block";
        document.getElementById("lista").innerHTML = cart.map(i => `<div class="card"><b>${i.n}</b><br>${i.d}</div>`).join('');
        document.getElementById("epi").value = ""; document.getElementById("ext").innerHTML = "";
    }

    async function env() {
        const b = document.getElementById("btn-env"); b.innerText = "Enviando..."; b.disabled = true;
        const u = document.getElementById("user").innerText;
        for (const i of cart) {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ protocolo: prot, funcionario: u, epi: i.n, detalhes: i.d }) });
        }
        ir(3);
    }
</script>
</body>
</html>
