<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon para aparecer na aba do navegador -->
    <link rel="icon" type="image/png" href="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png">
    <title>EPI's VIC</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: #ffffff; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center;
        }
        .logo { max-width: 160px; margin-bottom: 20px; height: auto; }
        h2 { color: var(--primary); font-size: 18px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin: 15px 0 5px; font-weight: bold; text-align: left; font-size: 14px; color: #444; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        .btn-add { background: var(--cyan); color: #004a99; margin-top: 15px; }
        .btn-enviar { background: #28a745; margin-top: 15px; }
        
        .card { background: #f9f9f9; border-left: 5px solid var(--primary); padding: 10px; margin-top: 8px; text-align: left; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .carrinho { margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }
        
        .footer-credits {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo" alt="Logo VLI">
    
    <!-- Tela 0: Início (Ganhando tempo para carregar o banco) -->
    <div id="p0" class="passo ativo">
        <h2>Portal de EPI</h2>
        <p style="color:#666; font-size: 14px;">Solicitação rápida de equipamentos.</p>
        <button onclick="iniciar()">Clique para Iniciar</button>
    </div>

    <!-- Tela 1: Login -->
    <div id="p1" class="passo">
        <label>Matrícula do Colaborador:</label>
        <input type="tel" id="mat" placeholder="Ex: 102030">
        <button onclick="logar()">Acessar</button>
    </div>

    <!-- Tela 2: Pedido -->
    <div id="p2" class="passo">
        <p id="user" style="font-weight:bold; color:var(--primary); margin-bottom: 15px;"></p>
        <label>Selecione o Item:</label>
        <select id="epi" onchange="render()"></select>
        <div id="ext"></div>
        
        <button class="btn-add" onclick="add()">+ Adicionar Item</button>
        
        <div id="cart-box" class="carrinho" style="display:none;">
            <p style="font-size:11px; font-weight:bold; color:#888; text-align:left;">ITENS SELECIONADOS:</p>
            <div id="lista"></div>
            <button class="btn-enviar" id="btn-env" onclick="env()">Finalizar e Enviar</button>
        </div>
    </div>

    <!-- Tela 3: Sucesso -->
    <div id="p3" class="passo">
        <div style="font-size: 55px; margin-bottom: 10px;">✅</div>
        <h3 style="color: #28a745; margin: 0;">Pedido Enviado!</h3>
        <p style="color:#666; font-size: 14px;">Os dados foram registrados com sucesso na planilha de controle.</p>
        <button onclick="location.reload()" style="background:#666; margin-top: 15px;">Novo Pedido</button>
    </div>
</div>

<div class="footer-credits">Powered By M.Custodio</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbzLPASIT6clTTipjS804v_MhdAqURqGQ0y-zFJ6sXLMzmFmEFrV68sUpOzQp_z0nQcXhQ/exec';
    let db = { funcionarios: {}, epis: [] }, cart = [], prot = "";

    // Inicia a busca dos dados assim que a página é aberta
    const fetchDados = fetch(URL).then(r => r.json()).catch(e => console.error("Erro ao pré-carregar:", e));

    function ir(n) {
        document.querySelectorAll('.passo').forEach(d => d.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    async function iniciar() {
        const btn = document.querySelector('#p0 button');
        btn.innerText = "Sincronizando...";
        btn.disabled = true;
        
        try {
            db = await fetchDados; // Aguarda a promessa que começou no carregamento da página
            if (!db || db.erro) throw new Error();
            
            const s = document.getElementById("epi");
            s.innerHTML = '<option value="">Escolha...</option>';
            db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
            ir(1);
        } catch (e) {
            alert("Erro ao conectar com o servidor VLI. Tente novamente.");
            btn.innerText = "Clique para Iniciar";
            btn.disabled = false;
        }
    }

    function logar() {
        const m = document.getElementById("mat").value.trim();
        if (db.funcionarios[m]) {
            const d = new Date();
            // Protocolo Único para todo o pedido
            prot = `VLI-${d.getDate()}${d.getMonth()+1}-${d.getHours()}${d.getMinutes()}${d.getSeconds()}`;
            document.getElementById("user").innerText = "Olá, " + db.funcionarios[m];
            ir(2);
        } else {
            alert("Matrícula não cadastrada!");
        }
    }

    function render() {
        const e = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const x = document.getElementById("ext"); x.innerHTML = "";
        if (e) {
            if (e.label) x.innerHTML += `<label>${e.label}</label><select id="v1">${e.opcoes.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            if (e.label2) x.innerHTML += `<label>${e.label2}</label><select id="v2">${e.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        }
    }

    function add() {
        const n = document.getElementById("epi").value;
        if (!n) return alert("Selecione um item!");
        
        const v1 = document.getElementById("v1")?.value || "";
        const v2 = document.getElementById("v2")?.value || "";
        
        cart.push({ n, d: (v1 + " " + v2).trim() });
        
        document.getElementById("cart-box").style.display = "block";
        document.getElementById("lista").innerHTML = cart.map(i => `<div class="card"><b>${i.n}</b><br><small>${i.d}</small></div>`).join('');
        
        // Limpa campos para novo item
        document.getElementById("epi").value = ""; 
        document.getElementById("ext").innerHTML = "";
    }

    async function env() {
        const b = document.getElementById("btn-env"); 
        b.innerText = "Processando..."; 
        b.disabled = true;
        
        const u = document.getElementById("user").innerText.replace("Olá, ", "");
        
        try {
            // Envia cada item com o mesmo protocolo
            for (const i of cart) {
                await fetch(URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        protocolo: prot, 
                        funcionario: u, 
                        epi: i.n, 
                        detalhes: i.d 
                    }) 
                });
            }
            ir(3);
        } catch (e) {
            alert("Erro ao enviar pedido.");
            b.innerText = "Enviar Pedido";
            b.disabled = false;
        }
    }
</script>
</body>
</html>
