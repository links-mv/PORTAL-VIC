<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal VIC</title>
    
    <style>
        :root { 
            --vli-azul: #0085B2;
            --vli-azul-escuro: #005f83;
            --vli-laranja: #F37021;
            --vli-verde: #24b34b; 
            --vli-erro: #e13d4b; 
            --radius-md: 14px; 
        }

        * { 
            box-sizing: border-box; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            color: #FFFFFF; 
        }

        body { background: var(--vli-azul-escuro); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background: var(--vli-azul); min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.3); }
        
        /* RESTAURAÇÃO COMPLETA DA LOGO PWA */
        .header { padding: 40px 24px 10px; text-align: center; }
        .logo-box { background: white; padding: 10px 20px; border-radius: var(--radius-md); display: inline-block; margin-bottom: 15px; }
        .logo-pwa { width: 90px; height: auto; display: block; }
        
        /* SAUDAÇÃO / PILULA DE USUÁRIO */
        .user-pill { background: rgba(255, 255, 255, 0.15); margin: 10px 28px 0; padding: 14px; border-radius: var(--radius-md); font-size: 14px; text-align: center; display: none; border: 1px solid rgba(255, 255, 255, 0.25); }
        .content { padding: 20px 28px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .step { display: none; width: 100%; }
        .step.active { display: flex; flex-direction: column; gap: 18px; }
        
        h3 { font-size: 20px; margin: 0; text-align: center; }
        label { display: block; font-weight: 700; margin-bottom: -10px; font-size: 11px; color: rgba(255,255,255,0.85); text-transform: uppercase; }
        
        input, select, textarea { width: 100%; padding: 15px; border: none; border-radius: var(--radius-md); font-size: 15px; background: #fff; color: #1E293B; outline: none; }
        input:disabled { background: rgba(255, 255, 255, 0.25); color: #ffffff; }
        
        /* CORREÇÃO DO TEXTO INVISÍVEL NO MOBILE */
        select option { 
            color: #1E293B !important; 
            background-color: #FFFFFF !important; 
        }

        .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; display: inline-flex; justify-content: center; align-items: center; }
        .btn-orange { background: var(--vli-laranja); color: white; }
        .btn-back { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.3); margin-top: 10px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .menu-card { background: #fff; padding: 20px 10px; border-radius: var(--radius-md); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;}
        .menu-card b { color: #1E293B; font-size: 13px; }
        .menu-card span { font-size: 28px; }
        
        .cart-item { background: #fff; padding: 12px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--vli-laranja); }
        .info-box { background: #fff; padding: 15px; border-radius: var(--radius-md); color: #1E293B; font-size: 13px; line-height: 1.5; }
        .watermark { text-align: center; padding: 15px; font-size: 10px; color: rgba(255, 255, 255, 0.3); margin-top: auto; }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,133,178,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/pt/e/e9/Logotipo_VLI.png" class="logo-pwa" alt="Logo VLI">
        </div>
    </div>
    
    <div id="user-pill" class="user-pill"></div>

    <div class="content">
        <div id="step-start" class="step active">
            <button type="button" class="btn btn-orange" onclick="initSystem()">Entrar no Portal VIC</button>
        </div>
        
        <div id="step-login" class="step">
            <h3>Login</h3>
            <label>Matrícula</label>
            <input type="tel" id="input-mat" placeholder="Digite sua matrícula">
            <button type="button" class="btn btn-orange" onclick="handleLogin()">Acessar</button>
        </div>

        <div id="step-menu" class="step">
            <div class="menu-grid">
                <div class="menu-card" onclick="goTo('step-epi')"><span>📦</span><b>Solicitar EPI</b></div>
                <div class="menu-card" onclick="goTo('step-desvio')"><span>⚠️</span><b>Relatar Desvio</b></div>
            </div>
            <div class="menu-grid">
                <div class="menu-card" onclick="goTo('step-troca')"><span>🔄</span><b>Trocar Turno</b></div>
                <div class="menu-card" onclick="checkFerias()"><span>📅</span><b>Minhas Férias</b></div>
            </div>
            <button type="button" class="btn btn-back" onclick="fazerLogout()" style="border:none; text-decoration:underline;">Sair / Trocar Usuário</button>
        </div>

        <div id="step-epi" class="step">
            <h3>Pedido de EPI</h3>
            <label>Escolha o Item</label>
            <select id="select-epi" onchange="updateEpiFields()"></select>
            
            <div id="epi-dinamico" style="display: flex; flex-direction: column; gap: 15px;"></div>
            
            <button type="button" class="btn btn-orange" style="background:#fff; color:var(--vli-laranja);" onclick="addItem()">+ Adicionar Item</button>
            
            <div id="cart-area" style="display:none; flex-direction: column; gap: 12px; margin-top:10px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
                <label>Lista de Pedidos:</label>
                <div id="cart-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <button type="button" class="btn btn-orange" onclick="sendEPI()">Finalizar Pedido</button>
            </div>
            <button type="button" class="btn btn-back" onclick="goToMenu()">Voltar</button>
        </div>

        <div id="step-desvio" class="step">
            <h3>Relatar Desvio</h3>
            <div id="desvio-form" style="display: flex; flex-direction: column; gap: 15px;">
                <label>Local</label>
                <select id="d-local">
                    <option>Pátio de Cima</option>
                    <option>Pátio de Baixo</option>
                    <option>Terminal do Carvão</option>
                    <option>Oficina</option>
                    <option>Estação</option>
                </select>
                <label>Ocorrência</label>
                <select id="d-tempo-tipo" onchange="document.getElementById('div-manual').style.display=(this.value==='manual'?'flex':'none')">
                    <option value="agora">Agora mesmo</option>
                    <option value="manual">Definir Data/Hora Retroativa</option>
                </select>
                <div id="div-manual" style="display:none; gap:10px;">
                    <input type="date" id="d-data-manual">
                    <input type="time" id="d-hora-manual">
                </div>
                <label>Descrição</label>
                <textarea id="d-desc" rows="3" placeholder="Relate o desvio de segurança encontrado..."></textarea>
                <button type="button" class="btn btn-orange" onclick="sendDesvio()">Registrar</button>
                <button type="button" class="btn btn-back" onclick="verMeusDesvios()">🔍 Ver Histórico</button>
            </div>
            <div id="desvio-lista" style="display:none; flex-direction: column; gap: 12px;">
                <div id="container-historico-desvios" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <button type="button" class="btn btn-back" onclick="document.getElementById('desvio-lista').style.display='none'; document.getElementById('desvio-form').style.display='flex';">Voltar ao Formulário</button>
            </div>
            <button type="button" class="btn btn-back" onclick="goToMenu()">Voltar ao Menu</button>
        </div>

        <div id="step-troca" class="step">
            <h3>Troca de Turno</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <label>Solicitante 1</label><input type="text" id="t-solicitante1" disabled>
                <label>Colega (Solicitante 2)</label><input type="text" id="t-solicitante2" placeholder="Nome Completo do Colega">
                <label>Data da Troca</label><input type="date" id="t-data-troca">
                <label>Data da Compensação</label><input type="date" id="t-data-compensacao">
                <label>Sua Escala</label><input type="text" id="t-escala1" placeholder="Ex: Letra A">
                <label>Escala do Colega</label><input type="text" id="t-escala2" placeholder="Ex: Letra B">
                <label>Inspetor Responsável</label>
                <select id="t-inspetor1">
                    <option value="">Selecione...</option>
                    <option value="Herques">Herques</option>
                    <option value="Gilberto">Gilberto</option>
                    <option value="Yuri">Yuri</option>
                    <option value="Geomar">Geomar</option>
                    <option value="Cátia">Cátia</option>
                    <option value="Rafael">Rafael</option>
                    <option value="Felipe">Felipe</option>
                </select>
                <label>Inspetor 2 (Opcional)</label>
                <select id="t-inspetor2">
                    <option value="">Selecione se houver...</option>
                    <option value="Herques">Herques</option>
                    <option value="Gilberto">Gilberto</option>
                    <option value="Yuri">Yuri</option>
                    <option value="Geomar">Geomar</option>
                    <option value="Cátia">Cátia</option>
                    <option value="Rafael">Rafael</option>
                    <option value="Felipe">Felipe</option>
                </select>
                <button type="button" class="btn btn-orange" onclick="sendTroca()">Cadastrar Troca</button>
            </div>
            <button type="button" class="btn btn-back" onclick="goToMenu()">Voltar</button>
        </div>

        <div id="step-ferias" class="step">
            <h3>Programação de Férias</h3>
            <div id="ferias-view-agendada" style="display:none;">
                <div class="info-box">
                    <b style="color: var(--vli-azul);">Agendamento Registrado:</b><br><br>
                    <div id="detalhe-ferias"></div>
                </div>
            </div>
            <div id="ferias-form-sugestao" style="display: flex; flex-direction: column; gap: 15px;">
                <label>Dias</label>
                <select id="f-dias"><option value="30">30 Dias</option><option value="20">20 Dias</option></select>
                <label>1ª Opção</label><input type="month" id="f-op1">
                <label>2ª Opção</label><input type="month" id="f-op2">
                <label>3ª Opção</label><input type="month" id="f-op3">
                <button type="button" class="btn btn-orange" onclick="sendFerias()">Salvar Opções</button>
            </div>
            <button type="button" class="btn btn-back" onclick="goToMenu()">Voltar</button>
        </div>

        <div id="step-sucesso" class="step" style="text-align:center;">
            <div style="font-size:50px; margin-top:20px;">✅</div>
            <h2>Salvo com Sucesso!</h2>
            <p style="font-size:14px; opacity:0.8;">Os dados foram inseridos na Planilha Integrada.</p>
            <button type="button" class="btn btn-orange" onclick="goToMenu()">Voltar ao Menu</button>
        </div>
    </div>
    <div class="watermark">Portal VIC v2.2</div>
</div>

<div id="loading-overlay"><div class="spinner"></div><div id="loading-text" style="margin-top:15px; font-weight:600;">Sincronizando...</div></div>

<script>
    // RECOPIE SUA URL ATUALIZADA DO EXECUTÁVEL DO GOOGLE APPS SCRIPT AQUI:
    const URL_API = 'https://script.google.com/macros/s/AKfycby7q7409A00TNwUpNn3v1SfuOfCKX56V290pztFS4BoFTPl95sUMhVvbE2J_epjKu4/exec'; 

    let db = { funcionarios: {}, epis: [], ferias: {}, desvios: [] };
    let user = { mat: "", nome: "" };
    let cart = [];

    // Carrega o usuário local imediatamente para não perder a saudação em telas lentas
    function checarUsuarioLocal() {
        const savedMat = localStorage.getItem('vic_user_mat');
        const savedNome = localStorage.getItem('vic_user_nome');
        if (savedMat && savedNome && savedNome !== "undefined") {
            user.mat = savedMat;
            user.nome = savedNome;
            exibirSaudacao();
            return true;
        }
        return false;
    }

    async function initSystem() {
        showLoad("Buscando dados da nuvem...");
        
        // Garante a exibição imediata se já houver login ativo localmente
        const logado = checarUsuarioLocal();

        try {
            const r = await fetch(URL_API);
            const json = await r.json();
            db = json.dados;
            
            // Popula o select principal de EPIs com os dados brutos recebidos
            const sel = document.getElementById('select-epi');
            sel.innerHTML = '<option value="">Selecione o EPI...</option>';
            if (db.epis && db.epis.length > 0) {
                db.epis.forEach(e => {
                    sel.innerHTML += `<option value="${e.nome}">${e.nome}</option>`;
                });
            }
            
            if (logado) {
                hideLoad();
                goTo('step-menu');
            } else {
                hideLoad();
                goTo('step-login');
            }
        } catch (e) { 
            console.error(e);
            hideLoad();
            // Se falhar a rede mas estiver logado localmente, deixa o usuário navegar no menu offline
            if (logado) {
                goTo('step-menu');
            } else {
                goTo('step-login');
            }
        }
    }
    
    function exibirSaudacao() {
        if (user.nome) {
            document.getElementById('user-pill').innerHTML = `👤 Nome: <b>${user.nome}</b><br><small>Matrícula: ${user.mat}</small>`;
            document.getElementById('user-pill').style.display = 'block';
            if (document.getElementById('t-solicitante1')) document.getElementById('t-solicitante1').value = user.nome;
        }
    }
    
    function goTo(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function goToMenu() { goTo('step-menu'); }
        
    function handleLogin() {
        const mat = document.getElementById('input-mat').value.trim();
        if (!mat) { alert("Por favor, digite sua matrícula."); return; }
        
        if (db.funcionarios && db.funcionarios[mat]) {
            user.mat = mat; 
            user.nome = db.funcionarios[mat].nome; // Captura o nome completo exato da planilha
            localStorage.setItem('vic_user_mat', user.mat);
            localStorage.setItem('vic_user_nome', user.nome);
            exibirSaudacao(); 
            goTo('step-menu');
        } else { 
            alert("Matrícula não localizada na planilha. Tente digitar novamente."); 
        }
    }
    
    function fazerLogout() { 
        localStorage.clear(); 
        user = { mat: "", nome: "" };
        document.getElementById('input-mat').value = '';
        document.getElementById('user-pill').style.display='none'; 
        goTo('step-login');
    }
        
    function updateEpiFields() {
        const item = document.getElementById('select-epi').value;
        const container = document.getElementById('epi-dinamico');
        container.innerHTML = '';
        if (!item || !db.epis) return;
        
        const epi = db.epis.find(e => e.nome === item);
        if (!epi) return;

        // Renderiza Variação 1
        if (epi.v1_nome && epi.v1_itens && epi.v1_itens.length > 0) {
            let html = `<label>${epi.v1_nome}</label><select id="epi-var1">`;
            epi.v1_itens.forEach(v => { html += `<option value="${v}">${v}</option>`; });
            html += `</select>`;
            container.innerHTML += html;
        } else {
            container.innerHTML += `<input type="hidden" id="epi-var1" value="-">`;
        }

        // Renderiza Variação 2
        if (epi.v2_nome && epi.v2_itens && epi.v2_itens.length > 0) {
            let html = `<label>${epi.v2_nome}</label><select id="epi-var2">`;
            epi.v2_itens.forEach(v => { html += `<option value="${v}">${v}</option>`; });
            html += `</select>`;
            container.innerHTML += html;
        } else {
            container.innerHTML += `<input type="hidden" id="epi-var2" value="-">`;
        }
        
        container.innerHTML += `<label>Quantidade</label><input type="number" id="epi-qtd" value="1" min="1" max="10">`;
    }
        
    function addItem() {
        const sel = document.getElementById('select-epi');
        if (!sel.value) return;
        
        const item = sel.value;
        const var1 = document.getElementById('epi-var1').value;
        const var2 = document.getElementById('epi-var2').value;
        const qtd  = document.getElementById('epi-qtd').value;
        
        cart.push({ item, var1, var2, qtd });
        renderCart();
        
        sel.value = '';
        document.getElementById('epi-dinamico').innerHTML = '';
    }
    
    function removeItem(i) { cart.splice(i, 1); renderCart(); }
        
    function renderCart() {
        const area = document.getElementById('cart-area');
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        if (cart.length === 0) { area.style.display = 'none'; return; }
        area.style.display = 'flex';
        cart.forEach((c, idx) => {
            list.innerHTML += `
                <div class="cart-item">
                    <div style="color:#1E293B">
                        <b style="color:#1E293B">${c.item}</b><br>
                        <span style="color:#64748B; font-size:12px;">V1: ${c.var1} | V2: ${c.var2} | Qtd: ${c.qtd}</span>
                    </div>
                    <button type="button" onclick="removeItem(${idx})" style="background:none; border:none; color:var(--vli-erro); font-weight:bold; font-size:18px;">×</button>
                </div>`;
        });
    }
        
    // AGRAVAMENTO DE SEGURANÇA NA SOLICITAÇÃO (Envia por POST para evitar estouro de URL ou falhas de gravação)
    async function sendEPI() {
        showLoad("Gravando pedido...");
        try {
            const corpo = { acao: 'solicitarEpi', matricula: user.mat, nome: user.nome, itens: JSON.stringify(cart) };
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(corpo), mode: 'no-cors' });
            cart = []; renderCart(); goTo('step-sucesso');
        } catch (e) { alert("Erro de envio."); } finally { hideLoad(); }
    }
        
    async function sendDesvio() {
        const local = document.getElementById('d-local').value;
        const tipo = document.getElementById('d-tempo-tipo').value;
        const desc = document.getElementById('d-desc').value.trim();
        if (!desc) { alert("Insira a descrição."); return; }
        
        let dataHora = new Date().toLocaleString('pt-BR');
        if (tipo === 'manual') {
            const d = document.getElementById('d-data-manual').value;
            const h = document.getElementById('d-hora-manual').value;
            if (!d || !h) { alert("Insira data e hora."); return; }
            dataHora = `${d} ${h}`;
        }
        
        showLoad("Gravando desvio...");
        try {
            const corpo = { acao: 'registrarDesvio', matricula: user.mat, nome: user.nome, local: local, dataHora: dataHora, descricao: desc };
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(corpo), mode: 'no-cors' });
            document.getElementById('d-desc').value = '';
            goTo('step-sucesso');
        } catch (e) { alert("Erro."); } finally { hideLoad(); }
    }
        
    function verMeusDesvios() {
        document.getElementById('desvio-form').style.display = 'none';
        const lista = document.getElementById('desvio-lista');
        lista.style.display = 'flex';
        const cont = document.getElementById('container-historico-desvios');
        cont.innerHTML = '';
        
        const filtrados = db.desvios ? db.desvios.filter(d => d.matricula == user.mat) : [];
        if (filtrados.length === 0) { cont.innerHTML = '<p style="text-align:center; color:#fff; font-size:12px;">Sem registros.</p>'; return; }
        
        filtrados.forEach(d => {
            cont.innerHTML += `<div class="info-box"><b>${d.local}</b> - <small>${d.dataHora}</small><br>${d.descricao}</div>`;
        });
    }
        
    function checkFerias() {
        goTo('step-ferias');
        const f = db.ferias ? db.ferias[user.mat] : null;
        if (f) {
            document.getElementById('ferias-form-sugestao').style.display = 'none';
            document.getElementById('ferias-view-agendada').style.display = 'block';
            document.getElementById('detalhe-ferias').innerHTML = `Dias: ${f.dias}<br>Opções: 1ª: ${f.op1} | 2ª: ${f.op2} | 3ª: ${f.op3}`;
        } else {
            document.getElementById('ferias-view-agendada').style.display = 'none';
            document.getElementById('ferias-form-sugestao').style.display = 'flex';
        }
    }
        
    async function sendFerias() {
        showLoad("Gravando férias...");
        try {
            const corpo = {
                acao: 'sugerirFerias', matricula: user.mat, nome: user.nome,
                dias: document.getElementById('f-dias').value,
                op1: document.getElementById('f-op1').value, op2: document.getElementById('f-op2').value, op3: document.getElementById('f-op3').value
            };
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(corpo), mode: 'no-cors' });
            goTo('step-sucesso');
        } catch(e){} finally { hideLoad(); }
    }

    async function sendTroca() {
        showLoad("Gravando troca...");
        try { 
            const corpo = {
                acao: 'registrarTroca', matricula: user.mat,
                solicitante1: document.getElementById('t-solicitante1').value,
                solicitante2: document.getElementById('t-solicitante2').value,
                dataTroca: document.getElementById('t-data-troca').value,
                dataCompensacao: document.getElementById('t-data-compensacao').value,
                escala1: document.getElementById('t-escala1').value,
                escala2: document.getElementById('t-escala2').value,
                inspetor1: document.getElementById('t-inspetor1').value,
                inspetor2: document.getElementById('t-inspetor2').value
            };
            await fetch(URL_API, { method: 'POST', body: JSON.stringify(corpo), mode: 'no-cors' });
            document.getElementById('t-solicitante2').value = '';
            goTo('step-sucesso'); 
        } catch(e){} finally { hideLoad(); }
    }

    function showLoad(t) { document.getElementById('loading-overlay').style.display = 'flex'; document.getElementById('loading-text').innerText = t; }
    function hideLoad() { document.getElementById('loading-overlay').style.display = 'none'; }
    
    // Execução inicial limpa
    window.onload = () => {
        checarUsuarioLocal();
        initSystem();
    };
</script>
</body>
</html>
