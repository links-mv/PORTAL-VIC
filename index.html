<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal VIC | VLI</title>
    <style>
        :root { 
            --vli-azul: #0077b6; --vli-laranja: #f39200; --vli-verde: #28a745; 
            --vli-erro: #e63946; --bg: #f4f7f9; --radius: 20px;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background: #fff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header { background: var(--vli-azul); padding: 45px 20px 55px; text-align: center; color: white; border-radius: 0 0 40px 40px; }
        .logo-box { background: white; padding: 12px; border-radius: 15px; display: inline-block; margin-bottom: 15px; }
        .logo { width: 100px; display: block; }
        .user-pill { background: #fff; margin: -25px auto 10px; padding: 12px; border-radius: 50px; font-size: 13px; color: var(--vli-azul); width: 80%; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); display: none; border: 1px solid #eee; z-index: 10;}
        .content { padding: 25px 20px; flex-grow: 1; }
        .step { display: none; animation: fadeIn 0.3s ease-in-out; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        label { display: block; font-weight: 700; margin: 18px 0 6px 5px; font-size: 11px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: var(--radius); font-size: 16px; background: #fdfdfd; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 12px; }
        .btn-blue { background: var(--vli-azul); color: white; }
        .btn-orange { background: var(--vli-laranja); color: white; }
        .btn-back { background: transparent; color: #999; font-size: 13px; margin-top: 15px; text-decoration: underline; border:none; width:100%;}
        .menu-card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: var(--radius); margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .info-box { background: #eef7ff; padding: 20px; border-radius: 15px; border: 1px solid #cfe2ff; color: #004a99; font-size: 14px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--vli-azul); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p id="loading-text" style="margin-top:15px; font-weight:700; color:var(--vli-azul);">Processando...</p></div>

<div class="container">
    <div class="header">
        <div class="logo-box"><img src="https://www.vli-logistica.com.br/wp-content/uploads/2023/09/cropped-logotipo-1-1-1.png" class="logo"></div>
        <div style="font-weight: 900; letter-spacing: 3px; font-size: 13px;">PORTAL VIC</div>
    </div>
    <div id="user-pill" class="user-pill"></div>

    <div class="content">
        <div id="step-start" class="step active" style="text-align:center; padding-top:30px;"><button class="btn btn-blue" onclick="initSystem()">Acessar Portal</button></div>
        
        <div id="step-login" class="step">
            <h3 style="color: var(--vli-azul); text-align: center;">Identificação</h3>
            <label>Matrícula</label>
            <input type="tel" id="input-mat" placeholder="Sua matrícula" maxlength="8">
            <button class="btn btn-blue" onclick="handleLogin()">Entrar</button>
        </div>

        <div id="step-menu" class="step">
            <div class="menu-card" onclick="goTo('step-epi')"><span>📦</span> <b>Solicitar EPI</b></div>
            <div class="menu-card" onclick="goTo('step-desvio')"><span>⚠️</span> <b>Relatar Desvio</b></div>
            <div class="menu-card" onclick="checkFerias()"><span>📅</span> <b>Minhas Férias</b></div>
            <button class="btn btn-back" onclick="location.reload()">Sair</button>
        </div>

        <div id="step-desvio" class="step">
            <h3 style="color: var(--vli-azul);">Relatar Desvio</h3>
            <div id="desvio-form">
                <label>Local</label>
                <select id="d-local"><option>Pátio de Cima</option><option>Pátio de Baixo</option><option>Oficina</option><option>Escritório</option></select>
                <label>Data e Hora</label>
                <select id="d-tempo-tipo" onchange="document.getElementById('div-manual').style.display=(this.value==='manual'?'flex':'none')"><option value="agora">Agora</option><option value="manual">Manual</option></select>
                <div id="div-manual" style="display:none; gap:10px; margin-top:10px;"><input type="date" id="d-data-manual"><input type="time" id="d-hora-manual"></div>
                <label>Descrição</label>
                <textarea id="d-desc" rows="4" placeholder="O que aconteceu?"></textarea>
                <button class="btn btn-blue" style="background:var(--vli-erro)" onclick="sendDesvio()">Registrar</button>
                <button class="btn btn-orange" style="font-size: 11px; margin-top: 15px;" onclick="verMeusDesvios()">Consultar Meus Relatos</button>
            </div>
            <div id="desvio-lista" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size:12px; color:#666; font-weight: bold;">Seu Histórico:</p>
                <div id="container-historico-desvios"></div>
                <button class="btn btn-back" onclick="document.getElementById('desvio-lista').style.display='none'; document.getElementById('desvio-form').style.display='block';">Ocultar Consultas</button>
            </div>
            <button class="btn btn-back" onclick="goToMenu()">Voltar ao Menu</button>
        </div>

        </div>
</div>

<script>
    const URL_API = 'COLOQUE_SEU_LINK_AQUI'; 
    let db = { funcionarios: {}, epis: [], ferias: {}, desvios: [] };
    let user = { mat: "", nome: "" };

    async function initSystem() {
        showLoad("Sincronizando...");
        try {
            const r = await fetch(URL_API);
            const json = await r.json();
            db = json.dados;
            hideLoad(); goTo('step-login');
        } catch (e) { alert("Erro de rede."); hideLoad(); }
    }

    function handleLogin() {
        const m = document.getElementById('input-mat').value.trim();
        const func = db.funcionarios[m] || db.funcionarios[parseInt(m)];
        if (func) {
            user = { mat: m, nome: func };
            document.getElementById('user-pill').innerHTML = `👤 <b>${user.nome}</b>`;
            document.getElementById('user-pill').style.display = "block";
            goTo('step-menu');
        } else { alert("Matrícula não encontrada."); }
    }

    function verMeusDesvios() {
        document.getElementById('desvio-form').style.display = 'none';
        document.getElementById('desvio-lista').style.display = 'block';
        const container = document.getElementById('container-historico-desvios');
        container.innerHTML = "";
        const meusDesvios = (db.desvios || []).filter(d => String(d.matricula) === String(user.mat));
        if (meusDesvios.length > 0) {
            [...meusDesvios].reverse().forEach(d => {
                container.innerHTML += `<div style="background:#f8f9fa; padding:10px; border-radius:10px; margin-bottom:8px; border-left:4px solid var(--vli-erro); font-size:13px;"><b>${d.dataFato} - ${d.local}</b><br>${d.descricao}</div>`;
            });
        } else { container.innerHTML = "<p style='font-size:12px; color:#999; text-align:center;'>Nenhum registro.</p>"; }
    }

    function showLoad(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading-overlay').style.display = 'flex'; }
    function hideLoad() { document.getElementById('loading-overlay').style.display = 'none'; }
    function goTo(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function goToMenu() { goTo('step-menu'); }
    // As funções sendDesvio, sendEPI, checkFerias seguem a mesma lógica anterior...
</script>
</body>
</html>
