<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png">
    <title>Portal VIC - Operacional</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --success: #28a745; --danger: #dc3545; --light: #f8f9fa; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: #ffffff; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;
            position: relative;
        }
        #user-header { 
            display: none; background: #e9ecef; margin: -25px -25px 20px -25px; 
            padding: 12px; font-size: 13px; font-weight: bold; color: var(--primary); 
            border-bottom: 2px solid #ddd; border-radius: 20px 20px 0 0;
        }
        .logo { width: 130px; height: 50px; margin-bottom: 10px; object-fit: contain; }
        h2 { color: var(--primary); font-size: 18px; margin-bottom: 15px; text-transform: uppercase; }
        
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 12px 0 5px; font-weight: bold; text-align: left; font-size: 13px; color: #333; }
        input, select, button, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; }
        textarea { resize: none; height: 90px; }
        
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-menu { background: var(--light); color: var(--primary); border: 2px solid var(--primary); margin-bottom: 12px; text-align: left; display: flex; align-items: center; justify-content: space-between; padding: 15px; }
        .btn-enviar { background: var(--success); margin-top: 15px; font-size: 16px; }
        .card { background: #f1f3f5; border-left: 5px solid var(--primary); padding: 10px; margin-top: 8px; text-align: left; font-size: 13px; border-radius: 5px; }
        .footer-credits { position: fixed; bottom: 10px; right: 15px; font-size: 10px; color: #fff; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div id="user-header">👤 <span id="header-nome"></span></div>
    
    <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo" alt="Logo VLI">
    
    <!-- TELA 0: SINCRONIZANDO -->
    <div id="p0" class="passo ativo">
        <h2>Portal VIC</h2>
        <p style="font-size: 14px; color: #666;">Carregando informações...</p>
        <button id="btn-iniciar" onclick="iniciar()">Entrar no Sistema</button>
    </div>

    <!-- TELA 1: LOGIN -->
    <div id="p1" class="passo">
        <label>Matrícula do Colaborador:</label>
        <input type="tel" id="mat" placeholder="Sua matrícula">
        <button onclick="logar()">Acessar</button>
    </div>

    <!-- TELA MENU -->
    <div id="pMenu" class="passo">
        <button class="btn-menu" onclick="ir('EPI')">Solicitar EPI's <span>🛡️</span></button>
        <button class="btn-menu" onclick="ir('Desvio')" style="border-color: var(--danger); color: var(--danger);">Relatar Desvio <span>⚠️</span></button>
        <button onclick="location.reload()" style="background:none; color:var(--danger); border:1px solid var(--danger); margin-top:20px; font-size:11px;">Sair / Trocar Usuário</button>
    </div>

    <!-- TELA EPI -->
    <div id="pEPI" class="passo">
        <label>Escolha o Item:</label>
        <select id="epi" onchange="renderEpi()"></select>
        <div id="ext-epi"></div>
        <button style="background: var(--cyan); color:#004a99;" onclick="addCarrinho()">+ Adicionar Item</button>
        <div id="box-carrinho" style="display:none; margin-top:20px; border-top:1px dashed #ccc; padding-top:10px;">
            <div id="lista-epi"></div>
            <button class="btn-enviar" id="btn-env-epi" onclick="enviarEpi()">Enviar Solicitação</button>
        </div>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:10px;">Voltar</button>
    </div>

    <!-- TELA DESVIO -->
    <div id="pDesvio" class="passo">
        <h2 style="color: var(--danger);">Desvio de Segurança</h2>
        
        <label>Quando ocorreu?</label>
        <select id="data-tipo" onchange="toggleData()">
            <option value="agora">Agora (Data/Hora atual)</option>
            <option value="retro">Selecionar outra data</option>
        </select>
        <div id="box-data" style="display:none; margin-top:10px;">
            <input type="datetime-local" id="data-retro">
        </div>

        <label>Área / Pátio:</label>
        <select id="patio">
            <option value="Pátio de Cima">Pátio de Cima</option>
            <option value="Pátio de Baixo">Pátio de Baixo</option>
            <option value="Pátio novo">Pátio novo</option>
            <option value="Terminal do Carvão">Terminal do Carvão</option>
            <option value="Oficina">Oficina</option>
            <option value="Estação">Estação</option>
        </select>

        <label>Especifique o Local:</label>
        <input type="text" id="local-detalhe" placeholder="Ex: AMV, Linha X, Prédio Y">
        
        <label>O que aconteceu?</label>
        <textarea id="desc-desvio" placeholder="Descreva o desvio observado..."></textarea>
        
        <button class="btn-enviar" id="btn-env-desvio" onclick="enviarDesvio()" style="background: var(--danger);">Registrar Desvio</button>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:10px;">Cancelar</button>
    </div>

    <!-- TELA SUCESSO -->
    <div id="pSucesso" class="passo">
        <div style="font-size: 50px;">✅</div>
        <h3 style="color: var(--success);">Enviado com Sucesso!</h3>
        <button onclick="ir('Menu')" style="background:var(--primary);">Voltar ao Menu</button>
    </div>
</div>

<div class="footer-credits">Powered By M.Custodio</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbxVIxtIg3YO54dYbYw1isoWjmvYM3orahypq4GwL6KemxPMaKiWYifhAHIgJaBR4yQXsA/exec';
    let db = { funcionarios: {}, epis: [] }, carrinho = [], userNome = "", userMat = "";

    function ir(n) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        document.getElementById('p' + n).classList.add('ativo');
    }

    function toggleData() {
        document.getElementById("box-data").style.display = document.getElementById("data-tipo").value === "retro" ? "block" : "none";
    }

    async function iniciar() {
        const btn = document.getElementById('btn-iniciar');
        btn.innerText = "Sincronizando..."; btn.disabled = true;
        try {
            const r = await fetch(URL);
            db = await r.json();
            const s = document.getElementById("epi");
            s.innerHTML = '<option value="">Escolha...</option>';
            db.epis.forEach(e => s.innerHTML += `<option value="${e.nome}">${e.nome}</option>`);
            ir(1);
        } catch (e) { 
            alert("Erro ao carregar dados."); 
            btn.innerText = "Tentar Novamente"; btn.disabled = false;
        }
    }

    function logar() {
        const m = document.getElementById("mat").value.trim();
        if (db.funcionarios[m]) {
            userMat = m;
            userNome = db.funcionarios[m];
            document.getElementById("header-nome").innerText = userNome;
            document.getElementById("user-header").style.display = "block";
            ir('Menu');
        } else { alert("Matrícula não cadastrada!"); }
    }

    function renderEpi() {
        const e = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const box = document.getElementById("ext-epi"); box.innerHTML = "";
        if (e) {
            if (e.label) box.innerHTML += `<label>${e.label}</label><select id="v1">${e.opcoes.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            if (e.label2) box.innerHTML += `<label>${e.label2}</label><select id="v2">${e.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        }
    }

    function addCarrinho() {
        const n = document.getElementById("epi").value;
        if (!n) return alert("Selecione um EPI!");
        const v1 = document.getElementById("v1")?.value || "";
        const v2 = document.getElementById("v2")?.value || "";
        carrinho.push({ n, d: (v1 + " " + v2).trim() });
        document.getElementById("box-carrinho").style.display = "block";
        document.getElementById("lista-epi").innerHTML = carrinho.map(i => `<div class="card"><b>${i.n}</b><br><small>${i.d}</small></div>`).join('');
        document.getElementById("epi").value = ""; document.getElementById("ext-epi").innerHTML = "";
    }

    async function enviarEpi() {
        const b = document.getElementById("btn-env-epi");
        b.innerText = "Enviando..."; b.disabled = true;
        const prot = "EPI-" + Math.floor(Date.now() / 10000);
        try {
            for (const i of carrinho) {
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "EPI", protocolo: prot, funcionario: userNome, matricula: userMat, epi: i.n, detalhes: i.d }) });
            }
            carrinho = []; ir('Sucesso');
        } catch (e) { alert("Erro!"); b.innerText = "Tentar novamente"; b.disabled = false; }
    }

    async function enviarDesvio() {
        const patio = document.getElementById("patio").value;
        const detalhe = document.getElementById("local-detalhe").value.trim();
        const desc = document.getElementById("desc-desvio").value.trim();
        const tData = document.getElementById("data-tipo").value;
        
        if (!detalhe || !desc) return alert("Preencha o local e a descrição!");

        let dF, hF;
        if (tData === "agora") {
            const agora = new Date();
            dF = agora.toLocaleDateString('pt-BR');
            hF = agora.getHours() + ":" + agora.getMinutes().toString().padStart(2, '0');
        } else {
            const r = new Date(document.getElementById("data-retro").value);
            if (isNaN(r)) return alert("Data inválida!");
            dF = r.toLocaleDateString('pt-BR');
            hF = r.getHours() + ":" + r.getMinutes().toString().padStart(2, '0');
        }

        const b = document.getElementById("btn-env-desvio");
        b.innerText = "Registrando..."; b.disabled = true;

        try {
            await fetch(URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ 
                    tipo: "DESVIO", 
                    nome: userNome, 
                    matricula: userMat, 
                    data: dF, 
                    horario: hF, 
                    local: patio + " | " + detalhe, 
                    descricao: desc 
                }) 
            });
            ir('Sucesso');
        } catch (e) { alert("Erro!"); b.innerText = "Tentar novamente"; b.disabled = false; }
    }
</script>
</body>
</html>
