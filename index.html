<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solicitações de EPI - VIC</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      display: flex;
      justify-content: center;
      align-items: flex-end; 
      min-height: 100vh;
      margin: 0;
    }

    /* Container da Logo dentro do Card */
    .logo-container {
      text-align: center;
      transition: all 0.4s ease;
      margin-bottom: 20px;
    }

    .logo-empresa {
      width: 150px; /* Grande na primeira página */
      height: auto;
      background: white;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.4s ease;
    }

    /* Classe para minimizar a logo */
    .logo-mini .logo-empresa {
      width: 70px;
      padding: 8px;
      border-radius: 12px;
    }

    .logo-mini {
      margin-bottom: 10px;
      margin-top: -15px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px 25px;
      border-radius: 35px 35px 0 0;
      box-shadow: 0 -5px 30px rgba(0,0,0,0.2);
      position: relative;
      z-index: 5;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      color: #333;
      font-size: 1.4rem;
      margin: 0 0 20px 0;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 12px;
    }

    .step { display: none; flex-grow: 1; }
    .step.active { display: block; animation: fadeIn 0.4s ease-out; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 16px;
      margin-bottom: 22px;
      border: 1px solid #ddd;
      border-radius: 14px;
      font-size: 16px; 
      background-color: #fcfcfc;
    }

    .user-banner {
      background: #f0f7ff;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid #d0e3ff;
    }

    .resumo-container {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .resumo-item {
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 5px solid #0072ff;
      font-size: 14px;
    }

    .numero-pedido {
      font-size: 2.5rem;
      font-weight: 800;
      color: #0072ff;
      margin: 10px 0;
      display: block;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn-next { background: #0072ff; color: white; }
    .btn-add { background: #28a745; color: white; margin-bottom: 10px; }
    .btn-cancel { background: none; color: #999; font-size: 14px; text-decoration: underline; margin-top: 15px; }

    @media (min-width: 600px) {
      body { align-items: center; }
      .card { border-radius: 30px; min-height: auto; margin: 20px; padding: 40px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- LOGO DINÂMICA -->
    <div id="logo-box" class="logo-container">
      <img src="https://images.seeklogo.com/logo-png/20/1/vli-logo-png_seeklogo-208919.png" alt="Logo VLI" class="logo-empresa">
    </div>

    <!-- PASSO 1: LOGIN -->
    <div id="step1" class="step active">
      <h2 style="border: none; margin-top: 10px;">Portal de EPI - VIC</h2>
      <label>Matrícula do Funcionário</label>
      <input id="matricula" type="number" placeholder="Digite sua matrícula" inputmode="numeric">
      <button class="btn-next" onclick="identificarUsuario()">Acessar Sistema</button>
    </div>

    <!-- PASSO 2: FORMULÁRIO -->
    <div id="step2" class="step">
      <div class="user-banner">
        <strong id="nome-exibicao" style="color: #0072ff; font-size: 1.1rem;"></strong>
      </div>

      <label>Qual EPI você precisa?</label>
      <select id="epi" onchange="gerarCamposExtras()">
        <option value="">Selecione...</option>
        <option value="Botina">Botina de Segurança</option>
        <option value="Luva">Luva de Vaqueta</option>
        <option value="Capa de Chuva">Capa de Chuva</option>
        <option value="Calça">Calça Operacional</option>
        <option value="Capacete">Capacete</option>
        <option value="Óculos">Óculos de Proteção</option>
        <option value="Perneira">Perneira</option>
        <option value="Colete">Colete Refletivo</option>
        <option value="Suporte de Rádio">Suporte de Rádio</option>
      </select>

      <div id="opcoes-extras"></div>

      <label>Quantidade</label>
      <input id="quantidade" type="number" value="1" min="1">

      <button class="btn-next" onclick="adicionarAoCarrinho()">Adicionar Item</button>
      <button class="btn-cancel" onclick="location.reload()">Sair</button>
    </div>

    <!-- PASSO 3: CARRINHO -->
    <div id="step3" class="step">
      <h2>Sua Lista de Pedidos</h2>
      <div class="resumo-container" id="lista-resumo"></div>
      
      <button class="btn-add" onclick="irParaPasso(2)">+ Solicitar outro item</button>
      <button class="btn-next" onclick="enviarTudo()">Finalizar e Enviar</button>
    </div>

    <!-- PASSO 4: SUCESSO -->
    <div id="step4" class="step" style="text-align: center;">
      <span style="font-size: 50px;">✅</span>
      <h2 style="border: none; margin-bottom: 5px;">Solicitação Concluída!</h2>
      <p style="color: #666; font-size: 14px;">Protocolo:</p>
      <span class="numero-pedido" id="num-protocolo">0001</span>
      
      <div id="resumo-final-texto" style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 12px; font-size: 13px; margin-top: 15px; line-height: 1.6;">
      </div>

      <button class="btn-next" style="margin-top: 25px;" onclick="location.reload()">Fazer Novo Pedido</button>
    </div>
  </div>

  <script>
    const funcionarios = { "107501": "Shinader Belz", "106982": "Matheus Vitor", "106443": "Thuanny Sodre" };
    let carrinho = [];

    function irParaPasso(p) {
      // Minimiza a logo se não for o passo 1
      const logoBox = document.getElementById('logo-box');
      if (p > 1) {
        logoBox.classList.add('logo-mini');
      } else {
        logoBox.classList.remove('logo-mini');
      }

      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + p).classList.add('active');
    }

    function identificarUsuario() {
      const mat = document.getElementById("matricula").value;
      if (funcionarios[mat]) {
        document.getElementById("nome-exibicao").innerText = "Olá, " + funcionarios[mat];
        irParaPasso(2);
      } else { alert("Matrícula não cadastrada."); }
    }

    function gerarCamposExtras() {
      const epi = document.getElementById("epi").value;
      const container = document.getElementById("opcoes-extras");
      container.innerHTML = ""; 
      if (epi === "Botina") { container.innerHTML = `<label>Tamanho</label><select id="tamanho">${num(33, 45)}</select>`; }
      else if (epi === "Luva") { container.innerHTML = `<label>Tamanho</label><select id="tamanho"><option>P</option><option>M</option><option>G</option></select>`; }
      else if (epi === "Capa de Chuva" || epi === "Colete") { container.innerHTML = `<label>Tamanho</label><select id="tamanho"><option>P</option><option>M</option><option>G</option><option>GG</option><option>XG</option></select>`; }
      else if (epi === "Calça") { container.innerHTML = `<label>Gênero</label><select id="genero"><option>Masculino</option><option>Feminino</option></select><label>Tamanho</label><select id="tamanho">${num(34, 52)}</select>`; }
      else if (epi === "Óculos") { container.innerHTML = `<label>Modelo</label><select id="modelo"><option>Incolor</option><option>Fumê</option></select>`; }
      else if (epi === "Perneira") { container.innerHTML = `<label>Tamanho</label><select id="tamanho"><option>P</option><option>M</option><option>G</option><option>GG</option></select>`; }
    }

    function num(mi, ma) { let opt = ""; for (let i = mi; i <= ma; i++) { opt += `<option value="${i}">${i}</option>`; } return opt; }

    function adicionarAoCarrinho() {
      const epi = document.getElementById("epi").value;
      if (!epi) return alert("Selecione um EPI.");
      const qtd = document.getElementById("quantidade").value;
      const tam = document.getElementById("tamanho") ? document.getElementById("tamanho").value : "Único";
      const mod = document.getElementById("modelo") ? " (" + document.getElementById("modelo").value + ")" : "";
      const gen = document.getElementById("genero") ? " [" + document.getElementById("genero").value + "]" : "";

      carrinho.push({ desc: `${qtd}x ${epi}${gen}`, detalhe: `Tam/Tipo: ${tam}${mod}` });
      
      document.getElementById("lista-resumo").innerHTML = carrinho.map(i => `
        <div class="resumo-item"><strong>${i.desc}</strong><br><small>${i.detalhe}</small></div>
      `).join('');

      document.getElementById("epi").value = "";
      document.getElementById("opcoes-extras").innerHTML = "";
      irParaPasso(3);
    }

    function enviarTudo() {
      let ultimoNum = localStorage.getItem('protocoloVIC') || 0;
      let novoNum = parseInt(ultimoNum) + 1;
      localStorage.setItem('protocoloVIC', novoNum);
      
      document.getElementById("num-protocolo").innerText = novoNum.toString().padStart(4, '0');

      const resumoTexto = carrinho.map(i => `• ${i.desc} - ${i.detalhe}`).join('<br>');
      document.getElementById("resumo-final-texto").innerHTML = `<strong>Resumo dos itens:</strong><br>${resumoTexto}`;

      irParaPasso(4);
    }
  </script>
</body>
</html>
