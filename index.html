<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png">
    <title>Portal VIC - Operacional</title>
    <style>
        :root { --primary: #004a99; --cyan: #00bcd4; --success: #28a745; --danger: #dc3545; --light: #f8f9fa; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: #ffffff; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;
            position: relative;
        }
        /* Cabeçalho do Usuário Logado */
        #user-header { 
            display: none; background: #e9ecef; margin: -25px -25px 20px -25px; 
            padding: 12px; font-size: 13px; font-weight: bold; color: var(--primary); 
            border-bottom: 2px solid #ddd; border-radius: 20px 20px 0 0;
        }
        .logo { width: 130px; height: 50px; margin-bottom: 10px; object-fit: contain; }
        h2 { color: var(--primary); font-size: 18px; margin-bottom: 15px; }
        
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 12px 0 5px; font-weight: bold; text-align: left; font-size: 13px; color: #333; }
        input, select, button, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; }
        textarea { resize: none; height: 90px; }
        
        button { background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-menu { background: var(--light); color: var(--primary); border: 2px solid var(--primary); margin-bottom: 12px; text-align: left; display: flex; align-items: center; justify-content: space-between; padding: 15px; }
        .btn-enviar { background: var(--success); margin-top: 15px; font-size: 16px; }
        .card { background: #f1f3f5; border-left: 5px solid var(--primary); padding: 10px; margin-top: 8px; text-align: left; font-size: 13px; border-radius: 5px; }
        .footer-credits { position: fixed; bottom: 10px; right: 15px; font-size: 10px; color: #fff; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <!-- Nome do usuário fixo -->
    <div id="user-header">👤 <span id="header-nome">Carregando...</span></div>
    
    <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" class="logo" alt="Logo VLI">
    
    <!-- TELA INICIAL -->
    <div id="p0" class="passo ativo">
        <h2>Portal VIC</h2>
        <p style="font-size: 14px; color: #666;">Sincronizando base de dados...</p>
        <button id="btn-iniciar" onclick="iniciar()">Iniciar Sistema</button>
    </div>

    <!-- LOGIN -->
    <div id="p1" class="passo">
        <label>Informe sua Matrícula:</label>
        <input type="tel" id="mat" placeholder="Ex: 81000000">
        <button onclick="logar()">Acessar Portal</button>
    </div>

    <!-- MENU PRINCIPAL -->
    <div id="pMenu" class="passo">
        <button class="btn-menu" onclick="ir('EPI')">Solicitar EPI's <span>🛡️</span></button>
        <button class="btn-menu" onclick="ir('Desvio')" style="border-color: var(--danger); color: var(--danger);">Relatar Desvio <span>⚠️</span></button>
        <button onclick="location.reload()" style="background:none; color:var(--danger); border:1px solid var(--danger); margin-top:20px; font-size:11px; padding:5px;">Sair / Trocar Usuário</button>
    </div>

    <!-- ABA EPI -->
    <div id="pEPI" class="passo">
        <label>Selecione o EPI:</label>
        <select id="epi" onchange="renderOpcoesEPI()"></select>
        <div id="opcoes-extras-epi"></div>
        <button style="background: var(--cyan); color:#004a99;" onclick="adicionarAoCarrinho()">+ Adicionar na Lista</button>
        
        <div id="carrinho-container" style="display:none; margin-top:20px; border-top:1px dashed #ccc; padding-top:10px;">
            <div id="lista-carrinho"></div>
            <button class="btn-enviar" id="btn-finalizar-epi" onclick="enviarPedidoEPI()">Finalizar Pedido</button>
        </div>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:15px;">Voltar ao Menu</button>
    </div>

    <!-- ABA DESVIO -->
    <div id="pDesvio" class="passo">
        <h2 style="color: var(--danger);">Segurança: Desvio</h2>
        
        <label>Data da Ocorrência:</label>
        <select id="data-tipo" onchange="toggleDataRetroativa()">
            <option value="agora">Registrar com data/hora de agora</option>
            <option value="retroativo">Informar data passada</option>
        </select>
        <div id="box-data-retro" style="display:none; margin-top:10px;">
            <input type="datetime-local" id="data-manual">
        </div>

        <label>Pátio / Área:</label>
        <select id="desvio-patio">
            <option value="Pátio de Cima">Pátio de Cima</option>
            <option value="Pátio de Baixo">Pátio de Baixo</option>
            <option value="Pátio novo">Pátio novo</option>
            <option value="Terminal do Carvão">Terminal do Carvão</option>
            <option value="Oficina">Oficina</option>
            <option value="Estação">Estação</option>
        </select>

        <label>Especificar Local (AMV, Linha, Prédio):</label>
        <input type="text" id="desvio-local-detalhe" placeholder="Ex: AMV 02, Linha 04...">
        
        <label>Descrição do Desvio:</label>
        <textarea id="desvio-desc" placeholder="Descreva o que aconteceu ou a condição insegura..."></textarea>
        
        <button class="btn-enviar" id="btn-env-desvio" onclick="enviarDesvio()" style="background: var(--danger);">Enviar Relato de Segurança</button>
        <button onclick="ir('Menu')" style="background:#666; font-size:11px; margin-top:15px;">Cancelar</button>
    </div>

    <!-- SUCESSO -->
    <div id="pSucesso" class="passo">
        <div style="font-size: 60px; color: var(--success);">✔</div>
        <h3 style="color: var(--success);">Registrado com Sucesso!</h3>
        <p id="feedback-msg">A planilha foi atualizada.</p>
        <button onclick="ir('Menu')" style="background:var(--primary);">Voltar ao Início</button>
    </div>
</div>

<div class="footer-credits">Powered By M.Custodio</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycby8Nciysq-fADY6YTv74RgTyI_rRLifIX5-3MTcFU_XGLOw2HbFeKTtunMDp0NMgwDFyQ/exec';
    let db = { funcionarios: {}, epis: [] }, carrinho = [], userNome = "", userMat = "";

    function ir(nomePasso) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        document.getElementById('p' + nomePasso).classList.add('ativo');
    }

    function toggleDataRetroativa() {
        const display = document.getElementById("data-tipo").value === "retroativo" ? "block" : "none";
        document.getElementById("box-data-retro").style.display = display;
    }

    async function iniciar() {
        const btn = document.getElementById('btn-iniciar');
        btn.innerText = "Sincronizando..."; btn.disabled = true;
        try {
            const response = await fetch(URL_SCRIPT);
            db = await response.json();
            const comboEpi = document.getElementById("epi");
            comboEpi.innerHTML = '<option value="">Selecione um item...</option>';
            db.epis.forEach(item => comboEpi.innerHTML += `<option value="${item.nome}">${item.nome}</option>`);
            ir(1);
        } catch (e) { 
            alert("Erro ao conectar com a planilha. Verifique a internet."); 
            btn.innerText = "Tentar Novamente"; btn.disabled = false; 
        }
    }

    function logar() {
        const matriculaInput = document.getElementById("mat").value.trim();
        if (db.funcionarios[matriculaInput]) {
            userMat = matriculaInput;
            userNome = db.funcionarios[matriculaInput];
            document.getElementById("header-nome").innerText = userNome;
            document.getElementById("user-header").style.display = "block";
            ir('Menu');
        } else { 
            alert("Matrícula não encontrada no sistema."); 
        }
    }

    function renderOpcoesEPI() {
        const epiSelecionado = db.epis.find(x => x.nome === document.getElementById("epi").value);
        const containerExtras = document.getElementById("opcoes-extras-epi"); 
        containerExtras.innerHTML = "";
        if (epiSelecionado) {
            if (epiSelecionado.label) {
                containerExtras.innerHTML += `<label>${epiSelecionado.label}</label><select id="v1">${epiSelecionado.opcoes.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            }
            if (epiSelecionado.label2) {
                containerExtras.innerHTML += `<label>${epiSelecionado.label2}</label><select id="v2">${epiSelecionado.opcoes2.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
            }
        }
    }

    function adicionarAoCarrinho() {
        const nomeEpi = document.getElementById("epi").value;
        if (!nomeEpi) return alert("Selecione um EPI primeiro!");
        
        const v1 = document.getElementById("v1")?.value || "";
        const v2 = document.getElementById("v2")?.value || "";
        const detalhes = (v1 + " " + v2).trim();

        carrinho.push({ nome: nomeEpi, info: detalhes });
        
        document.getElementById("carrinho-container").style.display = "block";
        document.getElementById("lista-carrinho").innerHTML = carrinho.map((item, index) => 
            `<div class="card"><b>${item.nome}</b><br><small>${item.info}</small></div>`
        ).join('');

        document.getElementById("epi").value = "";
        document.getElementById("opcoes-extras-epi").innerHTML = "";
    }

    async function enviarPedidoEPI() {
        const b = document.getElementById("btn-finalizar-epi");
        b.innerText = "Enviando Pedido..."; b.disabled = true;
        const protocolo = "EPI-" + Math.floor(Math.random() * 9999);

        try {
            for (const item of carrinho) {
                await fetch(URL_SCRIPT, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ 
                        tipo: "EPI", protocolo: protocolo, funcionario: userNome, 
                        matricula: userMat, epi: item.nome, detalhes: item.info 
                    }) 
                });
            }
            carrinho = []; document.getElementById("lista-carrinho").innerHTML = "";
            document.getElementById("carrinho-container").style.display = "none";
            ir('Sucesso');
        } catch (e) { alert("Erro ao enviar."); b.innerText = "Tentar Novamente"; b.disabled = false; }
    }

    async function enviarDesvio() {
        const patio = document.getElementById("desvio-patio").value;
        const detalhe = document.getElementById("desvio-local-detalhe").value.trim();
        const desc = document.getElementById("desvio-desc").value.trim();
        const tipoData = document.getElementById("data-tipo").value;
        
        if (!detalhe || !desc) return alert("Por favor, detalhe o local e a descrição.");

        let dF, hF;
        if (tipoData === "agora") {
            const agora = new Date();
            dF = agora.toLocaleDateString('pt-BR');
            hF = agora.getHours() + ":" + agora.getMinutes().toString().padStart(2, '0');
        } else {
            const dataManual = new Date(document.getElementById("data-manual").value);
            if (isNaN(dataManual)) return alert("Data inválida.");
            dF = dataManual.toLocaleDateString('pt-BR');
            hF = dataManual.getHours() + ":" + dataManual.getMinutes().toString().padStart(2, '0');
        }

        const b = document.getElementById("btn-env-desvio");
        b.innerText = "Registrando Segurança..."; b.disabled = true;

        try {
            await fetch(URL_SCRIPT, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ 
                    tipo: "DESVIO", nome: userNome, matricula: userMat, 
                    data: dF, horario: hF, local: patio + " | " + detalhe, descricao: desc 
                }) 
            });
            ir('Sucesso');
        } catch (e) { alert("Erro de conexão."); b.innerText = "Tentar Novamente"; b.disabled = false; }
    }
</script>
</body>
</html>
