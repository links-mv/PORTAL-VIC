<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de EPI - VIC</title>
    <style>
        :root { 
            --primary: #004a99; 
            --cyan-bg: #00bcd4; 
            --cyan-light: #e0f7fa; 
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--cyan-bg), #008ba3); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }
        
        .container { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 120px; height: auto; }
        
        h2 { color: var(--primary); text-align: center; margin-top: 0; font-size: 22px; }
        h3.saudacao { color: #333; text-align: center; font-size: 24px; margin-bottom: 5px; }
        p.subtexto { text-align: center; color: #666; margin-bottom: 25px; }
        
        .passo { display: none; }
        .passo.ativo { display: block; animation: fadeIn 0.4s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #003570; transform: scale(1.02); }
        button:disabled { background: #999; cursor: not-allowed; }
        
        .btn-adicionar { background: var(--cyan-bg); }
        .btn-finalizar { background: #28a745; }
        .btn-voltar { background: none; color: #666; border: 1px solid #ddd; margin-top: 10px; }

        .item-carrinho { background: var(--cyan-light); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--primary); color: #333; font-size: 14px;}
        .loading-text { text-align: center; font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://logodownload.org/wp-content/uploads/2020/05/vli-logistica-logo-0.png" alt="Logo VLI" class="logo">
    </div>

    <h2>Portal de EPI - VIC</h2>

    <!-- PASSO 0: INICIAL -->
    <div id="passo0" class="passo ativo">
        <h3 id="texto-saudacao" class="saudacao">Olá!</h3>
        <p class="subtexto">Sistema de requisição de materiais.</p>
        <button id="btn-iniciar" onclick="iniciarPedido()">Iniciar Pedido</button>
        <div id="status-sinc" class="loading-text">Sincronizando dados...</div>
    </div>

    <!-- PASSO 1: LOGIN -->
    <div id="passo1" class="passo">
        <label for="matricula">Matrícula:</label>
        <input type="number" id="matricula" placeholder="Digite sua matrícula">
        <button onclick="identificarUsuario()">Acessar Sistema</button>
        <button onclick="irParaPasso(0)" class="btn-voltar">Voltar</button>
    </div>

    <!-- PASSO 2: SELEÇÃO DE EPI -->
    <div id="passo2" class="passo">
        <h3 id="nome-exibicao" style="text-align:center; color:var(--primary); margin-bottom: 20px;">Olá!</h3>
        
        <label for="epi">Selecione o EPI:</label>
        <select id="epi" onchange="atualizarCamposVariaveis()">
            <option value="">Carregando itens...</option>
        </select>

        <!-- VARIAÇÃO 1 (Ex: Sexo) -->
        <div id="container-var1" style="display:none;">
            <label id="label-var1" for="select-var1">Variação 1:</label>
            <select id="select-var1"></select>
        </div>

        <!-- VARIAÇÃO 2 (Ex: Tamanho) -->
        <div id="container-var2" style="display:none;">
            <label id="label-var2" for="select-var2">Variação 2:</label>
            <select id="select-var2"></select>
        </div>

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" value="1" min="1">
        
        <button onclick="adicionarAoCarrinho()" class="btn-adicionar">Adicionar ao Pedido</button>
        <button onclick="irParaPasso(1)" class="btn-voltar">Sair / Trocar Usuário</button>
    </div>

    <!-- RESUMO / CARRINHO -->
    <div id="passo-carrinho" class="passo">
        <h3 style="text-align:center; color:var(--primary);">Resumo do Pedido</h3>
        <div id="lista-carrinho" style="margin-top:20px;"></div>
        <button onclick="irParaPasso(2)" style="background: var(--cyan-bg);">+ Adicionar Outro Item</button>
        <button id="btn-finalizar-pedido" onclick="enviarTudo()" class="btn-finalizar">Finalizar Pedido</button>
    </div>

    <!-- FINALIZAÇÃO -->
    <div id="passo3" class="passo" style="text-align: center;">
        <div style="font-size: 60px; margin-bottom: 15px;">✅</div>
        <h3 style="color: #28a745;">Pedido Enviado!</h3>
        <p>Número de protocolo:</p>
        <h1 id="num-protocolo" style="color: var(--primary); font-size: 45px; margin: 10px 0;">0000</h1>
        <button onclick="window.location.reload()">Novo Pedido</button>
    </div>
</div>

<script>
    // URL DO SEU SCRIPT (Mantenha a mesma que você já usa)
    const SCRIPT_URL = 'SUA_URL_AQUI'; 
    
    let baseDados = { funcionarios: {}, epis: [] };
    let carrinho = [];

    window.onload = () => {
        definirSaudacao();
        sincronizarDados();
    };

    function definirSaudacao() {
        const hora = new Date().getHours();
        let saudacao = "Boa noite";
        if (hora >= 5 && hora < 12) saudacao = "Bom dia";
        else if (hora >= 12 && hora < 18) saudacao = "Boa tarde";
        document.getElementById("texto-saudacao").innerText = saudacao + "!";
    }

    async function sincronizarDados() {
        try {
            const response = await fetch(SCRIPT_URL);
            baseDados = await response.json();
            document.getElementById("status-sinc").innerText = "Dados prontos.";
        } catch (e) {
            document.getElementById("status-sinc").innerText = "Erro ao carregar dados.";
        }
    }

    function irParaPasso(n) {
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        const id = (typeof n === 'string') ? n : 'passo' + n;
        document.getElementById(id).classList.add('ativo');
    }

    function iniciarPedido() { irParaPasso(1); }

    function identificarUsuario() {
        const mat = document.getElementById("matricula").value;
        if (baseDados.funcionarios[mat]) {
            document.getElementById("nome-exibicao").innerText = "Olá, " + baseDados.funcionarios[mat];
            popularEPIs();
            irParaPasso(2);
        } else {
            alert("Matrícula não encontrada.");
        }
    }

    function popularEPIs() {
        const sel = document.getElementById("epi");
        sel.innerHTML = '<option value="">Selecione...</option>';
        baseDados.epis.forEach(e => {
            sel.innerHTML += `<option value="${e.nome}">${e.nome}</option>`;
        });
    }

    // A MÁGICA PARA AS NOVAS VARIÁVEIS ACONTECE AQUI
    function atualizarCamposVariaveis() {
        const nomeEpi = document.getElementById("epi").value;
        const epi = baseDados.epis.find(x => x.nome === nomeEpi);
        
        const c1 = document.getElementById("container-var1");
        const c2 = document.getElementById("container-var2");
        const s1 = document.getElementById("select-var1");
        const s2 = document.getElementById("select-var2");
        const l1 = document.getElementById("label-var1");
        const l2 = document.getElementById("label-var2");

        if (epi) {
            // Ajusta Variação 1
            if (epi.label && epi.opcoes.length > 0) {
                c1.style.display = "block";
                l1.innerText = epi.label + ":";
                s1.innerHTML = epi.opcoes.map(o => `<option value="${o}">${o}</option>`).join("");
            } else { c1.style.display = "none"; s1.innerHTML = ""; }

            // Ajusta Variação 2
            if (epi.label2 && epi.opcoes2.length > 0) {
                c2.style.display = "block";
                l2.innerText = epi.label2 + ":";
                s2.innerHTML = epi.opcoes2.map(o => `<option value="${o}">${o}</option>`).join("");
            } else { c2.style.display = "none"; s2.innerHTML = ""; }
        }
    }

    function adicionarAoCarrinho() {
        const epi = document.getElementById("epi").value;
        if (!epi) return alert("Selecione um item.");

        const v1 = document.getElementById("select-var1").value || "";
        const v2 = document.getElementById("select-var2").value || "";
        const qtd = document.getElementById("quantidade").value;

        // Formata os detalhes: "Masculino / G"
        let detalhes = v1;
        if (v1 && v2) detalhes += " / " + v2;
        else if (v2) detalhes = v2;

        carrinho.push({ epi, detalhes, qtd });
        renderizarCarrinho();
        irParaPasso('passo-carrinho');
    }

    function renderizarCarrinho() {
        const lista = document.getElementById("lista-carrinho");
        lista.innerHTML = carrinho.map(i => `
            <div class="item-carrinho">
                <strong>${i.qtd}x</strong> ${i.epi} <br>
                <small>${i.detalhes}</small>
            </div>
        `).join("");
    }

    async function enviarTudo() {
        const btn = document.getElementById("btn-finalizar-pedido");
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const protocolo = Math.floor(1000 + Math.random() * 9000);
        const nome = document.getElementById("nome-exibicao").innerText.replace("Olá, ", "");

        try {
            for (let item of carrinho) {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        protocolo: protocolo,
                        funcionario: nome,
                        epi: item.epi,
                        detalhes: item.detalhes,
                        quantidade: item.qtd
                    })
                });
            }
            document.getElementById("num-protocolo").innerText = protocolo;
            irParaPasso(3);
        } catch (e) {
            alert("Erro ao enviar pedido.");
            btn.disabled = false;
            btn.innerText = "Finalizar Pedido";
        }
    }
</script>
</body>
</html>
