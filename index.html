<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Operacional | VIC</title>
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00bcd4;
            --danger: #d90429;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header Estilizado */
        .header {
            background: var(--primary);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-radius: 0 0 30px 30px;
        }

        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        /* Status de Usuário */
        .user-pill {
            background: #e9ecef;
            margin: -20px auto 20px;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .content { padding: 20px; flex-grow: 1; }

        /* Transições de Tela */
        .step { display: none; animation: slideUp 0.4s ease-out; }
        .step.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs e Botões */
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #555; }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px;
            background: #f8fafc;
        }

        input:focus { border-color: var(--secondary); outline: none; background: #fff; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Lista de Itens */
        .cart-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PORTAL VIC</h1>
        <p>Gestão de Segurança e EPI</p>
    </div>

    <div id="user-pill" class="user-pill"></div>

    <div class="content">
        <!-- TELA 0: CARREGAMENTO -->
        <div id="step0" class="step active">
            <div class="loader"></div>
            <p style="text-align: center; color: #666;">Sincronizando dados...</p>
        </div>

        <!-- TELA 1: LOGIN -->
        <div id="step1" class="step">
            <h2 style="text-align: center; margin-bottom: 30px;">Identificação</h2>
            <label>Matrícula do Colaborador</label>
            <input type="tel" id="input-mat" placeholder="Ex: 123456" inputmode="numeric">
            <button class="btn btn-main" onclick="handleLogin()">Acessar Sistema</button>
        </div>

        <!-- TELA 2: MENU PRINCIPAL -->
        <div id="step2" class="step">
            <h2 style="margin-bottom: 25px;">O que deseja realizar?</h2>
            <button class="btn btn-outline" onclick="openEPI()">📦 Solicitar EPI</button>
            <button class="btn btn-outline" onclick="goTo(4)">⚠️ Relatar Desvio</button>
            <button class="btn" style="background:none; color:#999; font-size:12px; margin-top:30px;" onclick="location.reload()">Sair do Sistema</button>
        </div>

        <!-- TELA 3: SOLICITAÇÃO DE EPI -->
        <div id="step3" class="step">
            <h2>Solicitar EPI</h2>
            <label>Selecione o Item</label>
            <select id="select-epi" onchange="updateFields()"></select>
            
            <div id="dynamic-area"></div>
            
            <button class="btn btn-main" style="background: var(--secondary);" onclick="addItem()">+ Adicionar Item</button>
            
            <div id="cart-area" style="margin-top: 30px; display: none;">
                <label>Itens no Pedido:</label>
                <div id="cart-list"></div>
                <button class="btn btn-main" id="btn-submit-epi" onclick="sendEPI()">Finalizar e Enviar</button>
            </div>
            
            <button class="btn" style="background:#eee;" onclick="goTo(2)">Voltar</button>
        </div>

        <!-- TELA 4: RELATO DE DESVIO -->
        <div id="step4" class="step">
            <h2>Relatar Desvio</h2>
            <label>Área da Ocorrência</label>
            <select id="desvio-area">
                <option>Pátio de Cima</option>
                <option>Pátio de Baixo</option>
                <option>Oficina</option>
                <option>Administrativo</option>
            </select>
            <label>Descrição Breve</label>
            <textarea id="desvio-desc" rows="4" placeholder="Descreva o que observou..."></textarea>
            <button class="btn btn-danger" id="btn-submit-desvio" onclick="sendDesvio()">Registrar Desvio</button>
            <button class="btn" style="background:#eee;" onclick="goTo(2)">Cancelar</button>
        </div>

        <!-- TELA 5: SUCESSO -->
        <div id="step5" class="step" style="text-align: center; padding: 40px 0;">
            <div style="font-size: 70px; color: var(--secondary);">✔</div>
            <h2 style="color: var(--primary);">Enviado com Sucesso!</h2>
            <p style="color: #666; margin-bottom: 30px;">As informações já estão na planilha.</p>
            <button class="btn btn-main" onclick="goTo(2)">Novo Registro</button>
        </div>
    </div>

    <div class="footer">
        Powered by M.Custodio | 2026
    </div>
</div>

<script>
    // URL ATUALIZADA DO SEU SCRIPT
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbwR5B22QJ14pkp6-PWXIk5a8C7LMLlM5xX85yEipmKeoc1hHjJtp0pX2Z-HdIXerXFAYQ/exec';
    
    let db = { funcionarios: {}, epis: [] };
    let cart = [];
    let user = { mat: "", nome: "" };

    window.onload = init;

    async function init() {
        try {
            const response = await fetch(URL_SCRIPT);
            const json = await response.json();
            db = json.dados;
            
            const select = document.getElementById('select-epi');
            select.innerHTML = '<option value="">Selecione...</option>';
            db.epis.forEach(item => {
                select.innerHTML += `<option value="${item.nome}">${item.nome}</option>`;
            });
            
            goTo(1);
        } catch (e) {
            alert("Erro ao carregar banco de dados. Verifique a conexão.");
        }
    }

    function goTo(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        window.scrollTo(0,0);
    }

    function handleLogin() {
        const mat = document.getElementById('input-mat').value.trim();
        if (db.funcionarios[mat]) {
            user = { mat: mat, nome: db.funcionarios[mat] };
            const pill = document.getElementById('user-pill');
            pill.innerText = "👤 " + user.nome.split(' ')[0].toUpperCase();
            pill.style.display = "block";
            goTo(2);
        } else {
            alert("Matrícula não encontrada!");
        }
    }

    function updateFields() {
        const nome = document.getElementById('select-epi').value;
        const item = db.epis.find(i => i.nome === nome);
        const area = document.getElementById('dynamic-area');
        area.innerHTML = "";

        if (item) {
            if (item.label) {
                let html = `<label>${item.label}</label><select id="opt1">`;
                item.opcoes.forEach(o => html += `<option>${o}</option>`);
                area.innerHTML += html + `</select>`;
            }
            if (item.label2) {
                let html = `<label>${item.label2}</label><select id="opt2">`;
                item.opcoes2.forEach(o => html += `<option>${o}</option>`);
                area.innerHTML += html + `</select>`;
            }
        }
    }

    function addItem() {
        const nome = document.getElementById('select-epi').value;
        if (!nome) return alert("Selecione um EPI");
        
        const o1 = document.getElementById('opt1')?.value || "";
        const o2 = document.getElementById('opt2')?.value || "";
        
        cart.push({ nome, detalhes: `${o1} ${o2}`.trim() });
        renderCart();
    }

    function renderCart() {
        const area = document.getElementById('cart-area');
        const list = document.getElementById('cart-list');
        area.style.display = cart.length ? "block" : "none";
        
        list.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <div><b>${item.nome}</b><br><small>${item.detalhes}</small></div>
                <div onclick="cart.splice(${i},1);renderCart()" style="color:red; font-weight:bold">X</div>
            </div>
        `).join('');
    }

    async function sendEPI() {
        const btn = document.getElementById('btn-submit-epi');
        btn.disabled = true; btn.innerText = "Enviando...";
        const protocolo = "EPI-" + Math.floor(Date.now() / 1000);

        try {
            for (const item of cart) {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        tipo: "EPI", protocolo, funcionario: user.nome,
                        matricula: user.mat, epi: item.nome, detalhes: item.detalhes
                    })
                });
            }
            cart = []; renderCart(); goTo(5);
        } catch (e) { alert("Erro no envio"); btn.disabled = false; }
    }

    async function sendDesvio() {
        const desc = document.getElementById('desvio-desc').value;
        const local = document.getElementById('desvio-area').value;
        if (!desc) return alert("Descreva o desvio");

        const btn = document.getElementById('btn-submit-desvio');
        btn.disabled = true; btn.innerText = "Enviando...";

        try {
            await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    tipo: "DESVIO", nome: user.nome, matricula: user.mat,
                    data: new Date().toLocaleDateString('pt-BR'),
                    horario: new Date().toLocaleTimeString('pt-BR'),
                    local: local, descricao: desc
                })
            });
            goTo(5);
        } catch (e) { alert("Erro no envio"); btn.disabled = false; }
    }

    function openEPI() {
        cart = [];
        renderCart();
        goTo(3);
    }
</script>
</body>
</html>
