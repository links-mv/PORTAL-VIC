<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solicitações de EPI - VIC</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0072ff;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      display: flex;
      justify-content: center;
      align-items: flex-end; /* No celular, o card "nasce" de baixo */
      min-height: 100vh;
      margin: 0;
    }

    /* Logo Ajustada para não empurrar o conteúdo */
    .header-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 35vh; /* Área azul para a logo */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    .logo-empresa {
      width: 110px; /* Tamanho equilibrado */
      height: auto;
      background: white;
      padding: 12px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .card {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px 20px; /* Padding reduzido nas laterais */
      border-radius: 30px 30px 0 0; /* Bordas arredondadas só em cima */
      box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
      position: relative;
      z-index: 5;
      min-height: 65vh; /* Garante que o card ocupe a maior parte da tela */
    }

    h2 {
      text-align: center;
      color: #333;
      font-size: 1.5rem;
      margin: 0 0 25px 0;
    }

    .step { display: none; }
    .step.active { display: block; animation: slideUp 0.3s ease-out; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      padding-left: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 15px;
      font-size: 16px; 
      background-color: #fcfcfc;
    }

    .user-banner {
      background: #f0f7ff;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid #d0e3ff;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-next { background: #0072ff; color: white; }
    .btn-back { 
      background: none; 
      color: #888; 
      margin-top: 15px; 
      font-size: 14px;
      text-decoration: underline;
    }

    /* Ajustes para Desktop */
    @media (min-width: 600px) {
      body { align-items: center; }
      .card { 
        border-radius: 25px; 
        min-height: auto;
        margin: 20px;
      }
      .header-container { height: 100%; align-items: flex-start; padding-top: 40px; }
      .logo-empresa { position: absolute; left: 40px; }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <img src="https://images.seeklogo.com/logo-png/20/1/vli-logo-png_seeklogo-208919.png" alt="Logo VLI" class="logo-empresa">
  </div>

  <div class="card">
    <!-- PASSO 1 -->
    <div id="step1" class="step active">
      <h2>Solicitações EPI - VIC</h2>
      
      <label>Sua Matrícula</label>
      <input id="matricula" type="number" placeholder="Digite aqui sua matrícula" inputmode="numeric">
      
      <button class="btn-next" onclick="proximoPasso()">Avançar</button>
    </div>

    <!-- PASSO 2 -->
    <div id="step2" class="step">
      <div class="user-banner">
        <span style="font-size: 12px; color: #666; display: block; margin-bottom: 4px;">Funcionário Identificado:</span>
        <strong id="nome-exibicao" style="color: #0072ff; font-size: 1.2rem;"></strong>
      </div>

      <label>Qual EPI você precisa?</label>
      <select id="epi">
        <option value="">Selecione...</option>
        <option>Capacete</option>
        <option>Luva de Vaqueta</option>
        <option>Bota de Segurança</option>
        <option>Protetor Auricular</option>
      </select>

      <label>Quantidade</label>
      <input id="quantidade" type="number" value="1" min="1">

      <button class="btn-next" onclick="finalizar()">Enviar Solicitação</button>
      <button class="btn-back" onclick="voltarPasso()">Voltar para matrícula</button>
    </div>
  </div>

  <script>
    const funcionarios = {
      "107501": "Shinader Belz",
      "106982": "Matheus Vitor",
      "106443": "Thuanny Sodre"
    };

    function proximoPasso() {
      const mat = document.getElementById("matricula").value;
      const nome = funcionarios[mat];
      if (nome) {
        document.getElementById("nome-exibicao").innerText = nome;
        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");
      } else {
        alert("Matrícula não encontrada.");
      }
    }

    function voltarPasso() {
      document.getElementById("step2").classList.remove("active");
      document.getElementById("step1").classList.add("active");
    }

    function finalizar() {
      if(!document.getElementById("epi").value) return alert("Selecione o EPI");
      alert("✅ Solicitação enviada com sucesso!");
      location.reload();
    }
  </script>
</body>
</html>
